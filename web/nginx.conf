server {
    listen __AGENCY_WEB_LISTEN__;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; connect-src 'self' wss: ws:; font-src 'self' https://fonts.gstatic.com;" always;

    # Proxy auth config to gateway — the web UI fetches the token from here
    location /__agency/config {
        proxy_pass http://__AGENCY_GATEWAY_HOST__:__AGENCY_GATEWAY_PORT__;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy API requests to the gateway
    location /api/ {
        proxy_pass http://__AGENCY_GATEWAY_HOST__:__AGENCY_GATEWAY_PORT__;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Reverse proxy WebSocket connections
    # Auth model: the browser sends { type: 'auth', token } as the first WebSocket
    # message after the handshake. nginx does not inject a Bearer token here because
    # the container has no access to the user's auth token — auth is handled entirely
    # at the application layer.
    location /ws {
        proxy_pass http://__AGENCY_GATEWAY_HOST__:__AGENCY_GATEWAY_PORT__;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # Cache static assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "ok";
    }
}
