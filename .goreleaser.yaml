version: 2

project_name: agency

before:
  hooks:
    - npm --prefix web --cache .cache/npm ci
    - npm --prefix web run build
    - make firecracker-helpers

builds:
  - id: agency
    main: ./cmd/gateway/
    binary: agency
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
      - -X main.buildID={{.ShortCommit}}
  - id: agency-enforcer-host
    dir: ./images/enforcer
    main: .
    binary: agency-enforcer-host
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: default
    formats: [tar.gz]
    name_template: "agency_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE*
      - install.sh
      - services/*.py
      - services/**/*.py
      - services/**/*.yaml
      - services/**/requirements.txt
      - bin/enforcer
      - bin/agency-vsock-http-bridge
      - scripts/install/*
      - scripts/readiness/*
      - images/firecracker/buildroot/**/*
      - web/dist/index.html
      - web/dist/favicon.svg
      - web/dist/assets/*

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - ids:
      - default
    repository:
      owner: geoffbelknap
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    name: agency
    skip_upload: auto
    homepage: "https://github.com/geoffbelknap/agency"
    description: "Agency — An operating system for AI agents"
    conflicts:
      - agency-rc
    dependencies:
      - name: geoffbelknap/tap/microagent-kit
      - name: python@3.14
      - name: e2fsprogs
      - name: openssl@3
      - name: pkgconf
        type: build
      - name: rust
        type: build
    custom_block: |
      include Language::Python::Virtualenv

      pypi_packages package_name: "mitmproxy",
                    extra_packages: %w[
                      aiohttp==3.13.3
                      cryptography==46.0.6
                      httpx==0.28.1
                      networkx
                      pydantic==2.12.5
                      pyjwt==2.12.1
                      pyyaml==6.0.3
                      requests==2.32.3
