version: 2

project_name: agency

before:
  hooks:
    - npm --prefix web --cache .cache/npm ci
    - npm --prefix web run build
    - make firecracker-helpers

builds:
  - id: agency
    main: ./cmd/gateway/
    binary: agency
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
      - -X main.buildID={{.ShortCommit}}
  - id: agency-enforcer-host
    dir: ./images/enforcer
    main: .
    binary: agency-enforcer-host
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: default
    formats: [tar.gz]
    name_template: "agency_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE*
      - install.sh
      - services/*.py
      - services/**/*.py
      - services/**/*.yaml
      - services/**/requirements.txt
      - bin/enforcer
      - bin/agency-vsock-http-bridge
      - scripts/install/*
      - scripts/readiness/*
      - images/firecracker/buildroot/**/*
      - web/dist/index.html
      - web/dist/favicon.svg
      - web/dist/assets/*

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - ids:
      - default
    repository:
      owner: geoffbelknap
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    name: agency
    skip_upload: auto
    homepage: "https://github.com/geoffbelknap/agency"
    description: "Agency — An operating system for AI agents"
    conflicts:
      - agency-rc
    dependencies:
      - name: geoffbelknap/tap/microagent-kit
      - name: python@3.14
      - name: e2fsprogs
    custom_block: |
      include Language::Python::Virtualenv
      skip_clean "libexec/venv"

      resource "python-wheelhouse-darwin-arm64" do
        on_macos do
          if Hardware::CPU.arm?
            url "https://github.com/geoffbelknap/agency/releases/download/v{{ .Version }}/agency-python-wheelhouse-darwin-arm64.tar.gz"
            sha256 "{{ .Env.AGENCY_PYTHON_WHEELHOUSE_DARWIN_ARM64_SHA256 }}"
          end
        end
      end

      resource "python-wheelhouse-darwin-amd64" do
        on_macos do
          if Hardware::CPU.intel?
            url "https://github.com/geoffbelknap/agency/releases/download/v{{ .Version }}/agency-python-wheelhouse-darwin-amd64.tar.gz"
            sha256 "{{ .Env.AGENCY_PYTHON_WHEELHOUSE_DARWIN_AMD64_SHA256 }}"
          end
        end
      end

      resource "python-wheelhouse-linux-amd64" do
        on_linux do
          if Hardware::CPU.intel? && Hardware::CPU.is_64_bit?
            url "https://github.com/geoffbelknap/agency/releases/download/v{{ .Version }}/agency-python-wheelhouse-linux-amd64.tar.gz"
            sha256 "{{ .Env.AGENCY_PYTHON_WHEELHOUSE_LINUX_AMD64_SHA256 }}"
          end
        end
      end

      resource "python-wheelhouse-linux-arm64" do
        on_linux do
          if Hardware::CPU.arm? && Hardware::CPU.is_64_bit?
            url "https://github.com/geoffbelknap/agency/releases/download/v{{ .Version }}/agency-python-wheelhouse-linux-arm64.tar.gz"
            sha256 "{{ .Env.AGENCY_PYTHON_WHEELHOUSE_LINUX_ARM64_SHA256 }}"
          end
        end
      end
    extra_install: |
      venv = virtualenv_create(libexec/"venv", "python3.14")
      resources.find(&:url).stage do
        venv.pip_install Pathname.glob("*.whl")
      end
      (pkgshare/"bin").install_symlink bin/"agency-enforcer-host"
      pkgshare.install "bin"
      pkgshare.install "images"
      pkgshare.install "services"
      pkgshare.install "scripts"
      pkgshare.install "web"
    caveats: |
      Start Agency with:

        agency quickstart
    test: |
      system "#{bin}/agency", "--version"

release:
  github:
    owner: geoffbelknap
    name: agency
  extra_files:
    - glob: .release/homebrew-python-wheelhouses/agency-python-wheelhouse-*.tar.gz
  prerelease: auto
  name_template: "Agency v{{.Version}}"
