version: 2

project_name: agency

builds:
  - id: agency
    main: ./cmd/gateway/
    binary: agency
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
      - -X main.buildID={{.ShortCommit}}

archives:
  - id: default
    formats: [tar.gz]
    name_template: "agency_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE*
      - install.sh
      - services/**/*.py
      - services/**/*.yaml
      - services/**/requirements.txt
      - scripts/install/*
      - web/bin/*
      - web/dist/**/*
      - web/public/*
      - web/src/**/*
      - web/index.html
      - web/package.json
      - web/package-lock.json
      - web/tsconfig.json
      - web/vite.config.ts

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - ids:
      - default
    repository:
      owner: geoffbelknap
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    name: agency
    homepage: "https://github.com/geoffbelknap/agency"
    description: "Agency — An operating system for AI agents"
    dependencies:
      - name: python
      - name: e2fsprogs
      - name: node
    extra_install: |
      pkgshare.install "services"
      pkgshare.install "scripts"
      pkgshare.install "web"
    post_install: |
      ENV["AGENCY_PYTHON_VENV"] = "#{pkgshare}/.venv"
      system "#{pkgshare}/scripts/install/host-dependencies.sh", "--skip-system-packages"
    caveats: |
      Start here:

        agency quickstart

      Runtime dependencies:
        - python: host-managed infra services and egress Python environment
        - e2fsprogs: mke2fs for microVM root filesystem creation
        - node: local web UI build/preview for host-managed web

      Quick start guide: https://github.com/geoffbelknap/agency#readme
    test: |
      system "#{bin}/agency", "--version"

release:
  github:
    owner: geoffbelknap
    name: agency
  prerelease: auto
  name_template: "Agency v{{.Version}}"
