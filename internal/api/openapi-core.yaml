                    type: string
                  description: Filter by agent name
            responses:
                "200":
                    description: Procedure records
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    procedures:
                                        type: array
                                        items:
                                            $ref: "#/components/schemas/ProcedureRecord"
    /missions/{name}/episodes:
        get:
            operationId: listMissionEpisodes
            summary: List episode records for a mission (across all agents)
            tags: [Agents]
            parameters:
                - $ref: "#/components/parameters/missionName"
            responses:
                "200":
                    description: Episode records
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    episodes:
                                        type: array
                                        items:
                                            $ref: "#/components/schemas/EpisodeRecord"
                                    total:
                                        type: integer
    /missions/{name}/evaluations:
        get:
            operationId: listMissionEvaluations
            summary: List recent success criteria evaluation results for a mission
            tags: [Agents]
            parameters:
                - $ref: "#/components/parameters/missionName"
