openapi: 3.1.0
info:
    title: Agency Gateway API
    version: 0.1.0
    description: |-
        REST API for the Agency AI agent operating platform. Deploys agents in
        enforced isolation containers with credential scoping, network mediation,
        read-only constraints, and continuous audit.

        All endpoints except /health require API token authentication via the
        X-Agency-Token header. Streaming endpoints accept `Accept: application/x-ndjson`.

        This spec is the canonical Agency API contract. Agency product tiering is
        represented with vendor extensions such as `x-agency-tier` and
        `x-agency-stability`. Consumers should treat `core` as the supported
        default surface, `experimental` as opt-in, and `internal` as non-public.

        Generated API view: core.
    license:
        name: Proprietary
servers:
    - url: http://localhost:8200/api/v1
      description: Local gateway daemon
security:
    - apiToken: []
x-agency-spec-tiering:
    default_supported_tier: core
    tiers:
        - core
        - experimental
        - internal
tags:
    - name: Health
      description: Health check and platform initialization
      x-agency-tier: core
      x-agency-stability: supported
    - name: Agents
      description: Agent lifecycle — create, start, stop, halt, resume, restart, delete; budget, context, memory, economics
      x-agency-tier: core
      x-agency-stability: supported
    - name: Admin
      description: Administrative operations — doctor, destroy, trust, audit, egress, capabilities, policy, teams, registry, profiles
      x-agency-tier: core
      x-agency-stability: supported
      x-agency-note: Mixed tag. Some operations are core, while advanced governance and profile surfaces should move to operation-level tiering.
    - name: Graph
      description: Knowledge graph queries, export, ontology, curation, communities, quarantine, classification, principals
      x-agency-tier: core
      x-agency-stability: supported
      x-agency-note: Mixed tag. Query, retrieval, and stats are core; governance and ontology surfaces should move to operation-level tiering.
    - name: Infra
      description: Shared infrastructure lifecycle — up, down, rebuild, reload, status, routing, providers, setup
      x-agency-tier: core
      x-agency-stability: supported
      x-agency-note: Mixed tag. Basic infra and provider setup are core; advanced routing and broader setup surfaces may need operation-level tiering.
    - name: Comms
      description: Inter-agent communication channels, messages, unreads
      x-agency-tier: core
      x-agency-stability: supported
    - name: Creds
      description: Encrypted credential store — CRUD, rotate, test, groups; internal credential resolution
      x-agency-tier: core
      x-agency-stability: supported
    - name: MCP
      description: MCP tool registry — list and call tools
      x-agency-tier: core
      x-agency-stability: supported
paths:
    # ── Health ──────────────────────────────────────────────────────────────────
    /health:
        get:
            operationId: health
            summary: Health check
            tags: [Health]
            security: []
            responses:
                "200":
                    description: Gateway is healthy
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    status:
                                        type: string
                                        example: ok
                                    version:
                                        type: string
                                    build_id:
                                        type: string
    /init:
        post:
            operationId: initPlatform
            summary: Bootstrap the Agency platform
            tags: [Health]
            requestBody:
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                operator:
                                    type: string
                                force:
                                    type: boolean
                                anthropic_api_key:
                                    type: string
                                openai_api_key:
                                    type: string
            responses:
                "200":
                    description: Platform initialized
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/StatusResponse"
    # ── Agents ──────────────────────────────────────────────────────────────────
    /agents:
        get:
            operationId: listAgents
            summary: List all agents
            tags: [Agents]
            responses:
                "200":
                    description: Array of agent summaries
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: "#/components/schemas/AgentSummary"
        post:
            operationId: createAgent
            summary: Create a new agent
            tags: [Agents]
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [name]
                            properties:
                                name:
                                    type: string
                                preset:
                                    type: string
                                    default: generalist
            responses:
                "201":
                    description: Agent created
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/StatusResponse"
    /agents/{name}:
        get:
            operationId: showAgent
            summary: Show agent detail
            tags: [Agents]
            parameters:
                - $ref: "#/components/parameters/agentName"
            responses:
                "200":
                    description: Agent detail
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/AgentDetail"
                "404":
                    $ref: "#/components/responses/NotFound"
        delete:
            operationId: deleteAgent
            summary: Delete an agent and its containers
            tags: [Agents]
            parameters:
                - $ref: "#/components/parameters/agentName"
            responses:
                "200":
                    description: Agent deleted
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/StatusResponse"
                "404":
                    $ref: "#/components/responses/NotFound"
    /agents/{name}/start:
        post:
            operationId: startAgent
            summary: Start an agent (seven-phase sequence)
            description: |
                Runs the seven-phase start sequence: verify, enforcement, constraints,
                workspace, identity, body, session. Supports NDJSON streaming when
                Accept: application/x-ndjson is set.
            tags: [Agents]
            parameters:
                - $ref: "#/components/parameters/agentName"
            responses:
                "200":
                    description: Agent started (JSON or NDJSON stream)
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/StartResult"
                        application/x-ndjson:
                            schema:
                                description: Stream of phase progress events ending with a complete event. Events include gateway-measured elapsed_ms; phase events also include phase_elapsed_ms.
    /agents/{name}/restart:
        post:
            operationId: restartAgent
            summary: Restart an agent with key rotation
            tags: [Agents]
            parameters:
                - $ref: "#/components/parameters/agentName"
            responses:
                "200":
                    description: Agent restarted
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/StartResult"
                "404":
                    $ref: "#/components/responses/NotFound"
    /agents/{name}/stop:
        post:
            operationId: stopAgent
            summary: Stop (halt) an agent
            description: |
                Three-tier halt: supervised (graceful), immediate (SIGTERM), emergency
                (SIGKILL + silent). Emergency halt requires a reason (ASK Tenet 2).
            tags: [Agents]
            parameters:
                - $ref: "#/components/parameters/agentName"
            requestBody:
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                type:
                                    type: string
                                    enum: [supervised, immediate, emergency]
                                    default: supervised
                                reason:
                                    type: string
                                initiator:
                                    type: string
            responses:
                "200":
                    description: Halt record
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/HaltRecord"
    /agents/{name}/halt:
        post:
            operationId: haltAgent
            summary: Halt an agent (alias for stop)
            tags: [Agents]
            parameters:
                - $ref: "#/components/parameters/agentName"
            requestBody:
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                type:
                                    type: string
                                    enum: [supervised, immediate, emergency]
                                    default: supervised
                                reason:
                                    type: string
                                initiator:
                                    type: string
            responses:
                "200":
                    description: Halt record
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/HaltRecord"
    /agents/{name}/resume:
        post:
            operationId: resumeAgent
            summary: Resume a halted agent
            tags: [Agents]
            parameters:
                - $ref: "#/components/parameters/agentName"
            requestBody:
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                initiator:
                                    type: string
            responses:
                "200":
                    description: Agent resumed
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/StatusResponse"
    /agents/{name}/grant:
        post:
            operationId: grantAgent
            summary: Grant a capability to an agent
            tags: [Agents]
            parameters:
                - $ref: "#/components/parameters/agentName"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [capability]
                            properties:
                                capability:
                                    type: string
            responses:
                "200":
                    description: Capability granted
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    status:
                                        type: string
                                    agent:
                                        type: string
                                    capability:
                                        type: string
    /agents/{name}/revoke:
        post:
            operationId: revokeAgent
            summary: Revoke a capability from an agent
            tags: [Agents]
            parameters:
                - $ref: "#/components/parameters/agentName"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [capability]
                            properties:
                                capability:
                                    type: string
            responses:
                "200":
                    description: Capability revoked
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    status:
                                        type: string
                                    agent:
                                        type: string
                                    capability:
                                        type: string
    /agents/{name}/signal:
        post:
            operationId: relaySignal
            summary: Relay a body-originated signal via WebSocket
            description: |
                Mediated path: body -> enforcer -> gateway -> WebSocket hub.
                ASK tenet 2: every action leaves a trace.
            tags: [Agents]
            parameters:
                - $ref: "#/components/parameters/agentName"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [signal_type]
                            properties:
                                signal_type:
                                    type: string
                                data:
                                    type: object
                                    additionalProperties: true
            responses:
                "200":
                    description: Signal relayed
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/StatusResponse"
    /agents/{name}/channels:
        get:
            operationId: agentChannels
            summary: List channels an agent is a member of
            tags: [Agents]
            parameters:
                - $ref: "#/components/parameters/agentName"
            responses:
                "200":
                    description: Array of channels
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    type: object
    /agents/{name}/dm:
        post:
            operationId: ensureAgentDM
            summary: Ensure the dedicated direct-message channel for an agent
            tags: [Agents]
            parameters:
                - $ref: "#/components/parameters/agentName"
            responses:
                "200":
                    description: Dedicated DM channel is ready for use
                    content:
                        application/json:
                            schema:
                                type: object
                                required: [status, channel]
                                properties:
                                    status:
                                        type: string
                                        example: ready
                                    channel:
                                        type: string
                                        example: dm-henry
    /agents/{name}/results:
        get:
            operationId: listResults
            summary: List task results in agent workspace
            tags: [Agents]
            parameters:
                - $ref: "#/components/parameters/agentName"
            responses:
                "200":
                    description: Array of result identifiers with parsed metadata summaries when available
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    type: object
                                    properties:
                                        task_id:
                                            type: string
                                        has_metadata:
                                            type: boolean
                                        metadata:
                                            type: object
                                            additionalProperties: true
                                        pact:
                                            type: object
                                            nullable: true
                                            additionalProperties: true
                                        metadata_error:
                                            type: string
    /agents/{name}/results/{taskId}:
        get:
            operationId: getResult
            summary: Get a task result document
            tags: [Agents]
            parameters:
                - $ref: "#/components/parameters/agentName"
                - name: taskId
                  in: path
                  required: true
                  schema:
                    type: string
                - name: download
                  in: query
                  schema:
                    type: string
                    enum: ["true", "false"]
            responses:
                "200":
                    description: Markdown result document
                    content:
                        text/markdown:
                            schema:
                                type: string
                "404":
                    $ref: "#/components/responses/NotFound"
    /agents/{name}/results/{taskId}/metadata:
        get:
            operationId: getResultMetadata
            summary: Get structured task result metadata
            tags: [Agents]
            parameters:
                - $ref: "#/components/parameters/agentName"
                - name: taskId
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: YAML frontmatter metadata parsed from a task result document
                    content:
                        application/json:
                            schema:
                                type: object
                                required: [task_id, metadata, has_metadata]
                                properties:
                                    task_id:
                                        type: string
                                    has_metadata:
                                        type: boolean
                                    metadata:
                                        type: object
                                        additionalProperties: true
                                    pact:
                                        type: object
                                        nullable: true
                                        additionalProperties: true
                "404":
                    $ref: "#/components/responses/NotFound"
                "422":
                    description: Invalid result metadata
    /agents/{name}/pact/runs/{taskId}:
        get:
            operationId: getPactRun
            summary: Get a read-only PACT run projection for a task
            description: |
                Assembles a PACT run view from existing durable sources such as result
                artifact frontmatter and append-only audit events. This endpoint is a
                projection only; it does not create a new authoritative PACT storage
                layer.
            tags: [Agents]
            parameters:
                - $ref: "#/components/parameters/agentName"
                - name: taskId
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: PACT run projection assembled from result and audit evidence
                    content:
                        application/json:
                            schema:
                                type: object
                                required: [task_id, agent, audit_events, sources]
                                properties:
                                    task_id:
                                        type: string
                                    agent:
                                        type: string
                                    activation:
                                        type: object
                                        nullable: true
                                        additionalProperties: true
                                    contract:
                                        type: object
                                        nullable: true
                                        additionalProperties: true
                                    evidence:
                                        type: object
                                        nullable: true
                                        additionalProperties: true
                                    verdict:
                                        type: object
                                        nullable: true
                                        additionalProperties: true
                                    outcome:
                                        type: string
                                    artifact:
                                        type: object
                                        nullable: true
                                        additionalProperties: true
                                    audit_events:
                                        type: array
                                        items:
                                            type: object
                                            additionalProperties: true
                                    sources:
                                        type: array
                                        items:
                                            type: string
                "400":
                    description: Invalid task ID
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                "404":
                    $ref: "#/components/responses/NotFound"
    /agents/{name}/config:
        get:
            operationId: getAgentConfig
            summary: Get full agent config bundle
            tags: [Agents]
            parameters:
                - $ref: "#/components/parameters/agentName"
            responses:
                "200":
                    description: Agent configuration bundle
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/AgentConfigBundle"
                "404":
                    $ref: "#/components/responses/NotFound"
        put:
            operationId: updateAgentConfig
            summary: Partially update agent config
            description: |
                Accepts partial updates — only fields present in the request body are
                updated. ASK tenet 6: constraint changes trigger enforcer reload so the
                agent sees old or new, never a mix.
            tags: [Agents]
            parameters:
                - $ref: "#/components/parameters/agentName"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                agent_yaml:
                                    type: object
                                    additionalProperties: true
                                identity:
                                    type: string
                                    nullable: true
                                constraints:
                                    type: object
                                    additionalProperties: true
                                workspace:
                                    type: object
                                    additionalProperties: true
            responses:
                "200":
                    description: Updated config bundle
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/AgentConfigBundle"
                "404":
                    $ref: "#/components/responses/NotFound"
    /agents/{name}/runtime/manifest:
        get:
            operationId: showAgentRuntimeManifest
            summary: Show the persisted runtime manifest for an agent
            description: |
                Returns the persisted runtime contract for the agent, including the
                compiled spec, projected runtime status, backend inspection details, and
                backend capabilities. This is the operator-facing source of truth for
                runtime state; callers should not reconstruct runtime state from raw
                Docker conventions.
            tags: [Agents]
            parameters:
                - $ref: "#/components/parameters/agentName"
            responses:
                "200":
                    description: Agent runtime manifest
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/AgentRuntimeManifest"
                "404":
                    $ref: "#/components/responses/NotFound"
    /agents/{name}/runtime/status:
        get:
            operationId: showAgentRuntimeStatus
            summary: Show the projected runtime status for an agent
            description: |
                Returns the current runtime phase, health, backend identity, and
                transport connectivity state for the agent.
            tags: [Agents]
            parameters:
                - $ref: "#/components/parameters/agentName"
            responses:
                "200":
                    description: Agent runtime status
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/AgentRuntimeStatus"
                "404":
                    $ref: "#/components/responses/NotFound"
    /agents/{name}/runtime/validate:
        post:
            operationId: validateAgentRuntime
            summary: Validate the runtime contract for an agent
            description: |
                Runs fail-closed runtime validation against the active backend and
                transport configuration for the agent.
            tags: [Agents]
            parameters:
                - $ref: "#/components/parameters/agentName"
            responses:
                "200":
                    description: Runtime validated successfully
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/RuntimeValidationResult"
                "400":
                    description: Runtime validation failed
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/RuntimeValidationResult"
                "404":
                    $ref: "#/components/responses/NotFound"
    /agents/{name}/logs:
        get:
            operationId: agentLogs
            summary: Get agent audit logs
            tags: [Agents]
            parameters:
                - $ref: "#/components/parameters/agentName"
                - name: since
                  in: query
                  schema:
                    type: string
                    format: date-time
                - name: until
                  in: query
                  schema:
                    type: string
                    format: date-time
            responses:
                "200":
                    description: Array of audit log entries (max 500)
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    type: object
                                    additionalProperties: true
                                    properties:
                                        task_id:
                                            type: string
                                        has_result:
                                            type: boolean
                                            description: True when this audit event's task_id has a saved result artifact.
                                        result:
                                            type: object
                                            nullable: true
                                            properties:
                                                task_id:
                                                    type: string
                                                url:
                                                    type: string
    # ── Budget ──────────────────────────────────────────────────────────────────
    /agents/{name}/budget:
        get:
            operationId: getBudget
            summary: Get agent budget usage (computed from audit logs)
            description: |
                Returns daily and monthly usage with limits and remaining budget.
                Usage is computed from enforcer audit logs (same source as routing metrics).
                No separate budget recording needed — costs are derived from LLM call logs.
            tags: [Agents]
            parameters:
                - $ref: "#/components/parameters/agentName"
            responses:
                "200":
                    description: Budget state
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    agent_name:
                                        type: string
                                    daily_used:
                                        type: number
                                        format: double
                                    daily_limit:
                                        type: number
                                        format: double
                                    daily_remaining:
                                        type: number
                                        format: double
                                    monthly_used:
                                        type: number
                                        format: double
                                    monthly_limit:
                                        type: number
                                        format: double
                                    monthly_remaining:
                                        type: number
                                        format: double
                                    per_task_limit:
                                        type: number
                                        format: double
                                    today_llm_calls:
                                        type: integer
                                    today_input_tokens:
                                        type: integer
                                        format: int64
                                    today_output_tokens:
                                        type: integer
                                        format: int64
    /agents/{name}/budget/remaining:
        get:
            operationId: getBudgetRemaining
            summary: Get remaining budget (lightweight)
            tags: [Agents]
            parameters:
                - $ref: "#/components/parameters/agentName"
            responses:
                "200":
                    description: Remaining budget
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    daily_used:
                                        type: number
                                        format: double
                                    daily_limit:
                                        type: number
                                        format: double
                                    daily_remaining:
                                        type: number
                                        format: double
                                    monthly_used:
                                        type: number
                                        format: double
                                    monthly_limit:
                                        type: number
                                        format: double
                                    monthly_remaining:
                                        type: number
                                        format: double
    # ── Context ─────────────────────────────────────────────────────────────────
    /agents/{name}/context/constraints:
        get:
            operationId: getConstraints
            summary: Get current acknowledged constraints for an agent
            tags: [Agents]
            parameters:
                - $ref: "#/components/parameters/agentName"
            responses:
                "200":
                    description: Current constraints
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: true
    /agents/{name}/context/policy:
        get:
            operationId: getContextPolicy
            summary: Get agent name and current constraints
            tags: [Agents]
            parameters:
                - $ref: "#/components/parameters/agentName"
            responses:
                "200":
                    description: Agent policy view
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    agent:
                                        type: string
                                    constraints:
                                        type: object
                                        additionalProperties: true
    /agents/{name}/context/exceptions:
        get:
            operationId: getExceptions
            summary: Get exceptions (currently returns empty list)
            tags: [Agents]
            parameters:
                - $ref: "#/components/parameters/agentName"
            responses:
                "200":
                    description: Empty exception list
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    type: object
    /agents/{name}/context/changes:
        get:
            operationId: getChanges
            summary: Get full constraint change history
            tags: [Agents]
            parameters:
                - $ref: "#/components/parameters/agentName"
            responses:
                "200":
                    description: Array of constraint changes
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: "#/components/schemas/ConstraintChange"
    /agents/{name}/context/push:
        post:
            operationId: pushConstraints
            summary: Push new constraints to a running agent
            description: |
                Validates the request, calls Manager.Push, triggers async delivery to
                the agent's enforcer via WebSocket. Two-stage timeout handles alerting
                and auto-halt for unacknowledged changes.
            tags: [Agents]
            parameters:
                - $ref: "#/components/parameters/agentName"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [constraints, reason]
                            properties:
                                constraints:
                                    type: object
                                    additionalProperties: true
                                severity_override:
                                    type: string
                                reason:
                                    type: string
                                initiator:
                                    type: string
                                    default: operator
            responses:
                "202":
                    description: Constraint push accepted
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    change_id:
                                        type: string
                                    version:
                                        type: integer
                                    severity:
                                        type: string
                                    status:
                                        type: string
                                    ack_timeout_seconds:
                                        type: integer
    /agents/{name}/context/status:
        get:
            operationId: getContextStatus
            summary: Get latest constraint change status
            tags: [Agents]
            parameters:
                - $ref: "#/components/parameters/agentName"
            responses:
                "200":
                    description: Latest change status or no_changes
                    content:
                        application/json:
                            schema:
                                oneOf:
                                    - $ref: "#/components/schemas/ConstraintChange"
                                    - type: object
