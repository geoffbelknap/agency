                                mode:
                                    type: string
                                    enum: [denylist, allowlist, supervised-strict, supervised-permissive]
            responses:
                "200":
                    description: Updated egress configuration
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: true
                "400":
                    description: Invalid agent name or mode
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: true
    /admin/audit/summarize:
        post:
            operationId: auditSummarize
            summary: Trigger audit summarization and return MissionMetrics
            tags: [Admin]
            x-agency-tier: core
            x-agency-stability: supported
            responses:
                "200":
                    description: Audit summarization results
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    metrics:
                                        type: array
                                        items:
                                            type: object
                                            additionalProperties: true
                                    count:
                                        type: integer
    # ── MCP ─────────────────────────────────────────────────────────────────────
    /mcp/tools:
        get:
            operationId: mcpTools
