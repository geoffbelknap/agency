    # ── Meeseeks ────────────────────────────────────────────────────────────────
    /agents/meeseeks:
        post:
            operationId: spawnMeeseeks
            summary: Spawn an ephemeral Meeseeks sub-agent
            tags: [Agents]
            parameters:
                - name: parent
                  in: query
                  description: Parent agent name
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/MeeseeksSpawnRequest"
            responses:
                "201":
                    description: Meeseeks spawned
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    meeseeks_id:
                                        type: string
                                    status:
                                        type: string
                "429":
                    description: Spawn rate limit exceeded
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
        get:
            operationId: listMeeseeks
            summary: List Meeseeks (optionally filtered by parent)
            tags: [Agents]
            parameters:
                - name: parent
