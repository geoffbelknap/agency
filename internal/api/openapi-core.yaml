                "200":
                    description: Channel marked as read
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: true
    # ── Routing ─────────────────────────────────────────────────────────────────
    /infra/routing/metrics:
        get:
            operationId: routingMetrics
            summary: Get aggregated LLM usage metrics
            tags: [Infra]
            x-agency-tier: core
            x-agency-stability: supported
            parameters:
                - name: agent
                  in: query
                  description: Filter to a single agent
                  schema:
                    type: string
                - name: since
                  in: query
                  description: Start of time window (RFC3339 or YYYY-MM-DD, default last 24h)
                  schema:
                    type: string
                - name: until
                  in: query
                  description: End of time window (RFC3339 or YYYY-MM-DD, default now)
                  schema:
                    type: string
            responses:
                "200":
                    description: Usage metrics summary
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: true
    /infra/routing/config:
        get:
            operationId: routingConfig
            summary: Get model routing configuration (sanitized, no credentials)
            tags: [Infra]
            x-agency-tier: core
            x-agency-stability: supported
            responses:
                "200":
                    description: Routing configuration
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    configured:
                                        type: boolean
                                    version:
                                        type: string
                                    providers:
                                        type: object
                                        additionalProperties:
                                            type: object
                                            properties:
                                                api_base:
                                                    type: string
                                                auth_env:
                                                    type: string
                                                caching:
                                                    type: boolean
                                    models:
                                        type: object
                                        additionalProperties:
                                            type: object
                                            properties:
                                                provider:
                                                    type: string
                                                provider_model:
                                                    type: string
                                                cost_per_mtok_in:
                                                    type: number
                                                cost_per_mtok_out:
                                                    type: number
                                                cost_per_mtok_cached:
                                                    type: number
                                    tiers:
                                        type: object
                                        additionalProperties: true
                                    settings:
                                        type: object
                                        additionalProperties: true
    /infra/routing/stats:
        get:
            operationId: routingStats
            summary: Per-model per-task-type LLM usage statistics
            tags: [Infra]
            x-agency-tier: core
            x-agency-stability: supported
            parameters:
                - name: task_type
                  in: query
                  schema:
                    type: string
            responses:
                "200":
                    description: Model statistics with success rates and costs
    # ── Admin ───────────────────────────────────────────────────────────────────
    /admin/doctor:
        get:
            operationId: adminDoctor
            summary: Run security guarantee checks on all running agents
            description: |
                Runs 7 checks per agent: credentials isolated, network mediation,
                constraints read-only, enforcer audit active, audit not writable,
                halt functional, operator override available.

                The report is structured as runtime checks plus backend-specific
                hygiene checks. For the Docker backend, Docker warnings should be read
                as substrate hygiene, not as generic runtime contract failure.
            tags: [Admin]
            x-agency-tier: core
            x-agency-stability: supported
            responses:
                "200":
                    description: Doctor report
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/DoctorReport"
    /admin/destroy:
        post:
            operationId: adminDestroy
            summary: Destroy all agents and infrastructure
            tags: [Admin]
            x-agency-tier: core
            x-agency-stability: supported
            responses:
                "200":
                    description: Everything destroyed
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/StatusResponse"
    /admin/prune-images:
        post:
            operationId: adminPruneImages
            summary: Remove true dangling untagged Agency images
            tags: [Admin]
            x-agency-tier: core
            x-agency-stability: supported
            responses:
                "200":
                    description: Dangling-image prune result
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    status:
                                        type: string
                                    pruned:
                                        type: integer
                                    skipped:
                                        type: integer
    /admin/audit:
        get:
            operationId: adminAudit
            summary: Query audit logs
            description: |
                With action=stats returns aggregate statistics. Otherwise returns log
                entries filtered by agent, since, and until. Log-entry responses are
                read-time projections over append-only audit JSONL and may include
                result-artifact correlation fields when a task result exists.
            tags: [Admin]
            x-agency-tier: core
            x-agency-stability: supported
            parameters:
                - name: action
                  in: query
                  schema:
                    type: string
                    enum: [stats]
                - name: agent
                  in: query
                  schema:
                    type: string
                - name: since
                  in: query
                  schema:
                    type: string
                - name: until
                  in: query
                  schema:
                    type: string
            responses:
                "200":
                    description: Audit log entries or stats
                    content:
                        application/json:
                            schema:
                                oneOf:
                                    - type: object
                                      additionalProperties: true
                                    - type: array
                                      items:
                                        type: object
                                        additionalProperties: true
                                        properties:
                                            has_result:
                                                type: boolean
                                            result:
                                                type: object
                                                properties:
                                                    task_id:
                                                        type: string
                                                    url:
                                                        type: string
                                            evidence_entries:
                                                type: array
                                                items:
                                                    type: object
                                                    additionalProperties: true
    /admin/egress:
        get:
            operationId: adminEgress
            summary: Get egress configuration for an agent
            tags: [Admin]
            x-agency-tier: core
            x-agency-stability: supported
            parameters:
                - name: agent
                  in: query
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: Egress configuration
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: true
    /admin/egress/{agent}/domains:
        post:
            operationId: adminEgressApproveDomain
            summary: Approve an egress domain for an agent
            tags: [Admin]
            x-agency-tier: core
            x-agency-stability: supported
            parameters:
                - name: agent
                  in: path
                  required: true
                  schema:
                    type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [domain]
                            properties:
                                domain:
                                    type: string
                                reason:
                                    type: string
            responses:
                "200":
                    description: Updated egress configuration
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: true
                "400":
                    description: Invalid agent name or domain
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: true
    /admin/egress/{agent}/domains/{domain}:
        delete:
            operationId: adminEgressRevokeDomain
            summary: Revoke an egress domain for an agent
            tags: [Admin]
            x-agency-tier: core
            x-agency-stability: supported
            parameters:
                - name: agent
                  in: path
                  required: true
                  schema:
                    type: string
                - name: domain
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: Updated egress configuration
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: true
                "400":
                    description: Invalid agent name or domain
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: true
    /admin/egress/{agent}/mode:
        put:
            operationId: adminEgressMode
            summary: Set the egress mode for an agent
            tags: [Admin]
