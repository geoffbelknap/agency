                  in: query
                  schema:
                    type: string
                  description: Filter by mission ID
                - name: outcome
                  in: query
                  schema:
                    type: string
                    enum: [success, partial, failed]
                  description: Filter by outcome
            responses:
                "200":
                    description: Procedure records
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    procedures:
                                        type: array
                                        items:
                                            $ref: "#/components/schemas/ProcedureRecord"
    /agents/{name}/episodes:
        get:
            operationId: listAgentEpisodes
            summary: List episode records for an agent
            tags: [Agents]
            parameters:
                - $ref: "#/components/parameters/agentName"
                - name: mission
                  in: query
                  schema:
                    type: string
                  description: Filter by mission name
                - name: from
                  in: query
                  schema:
                    type: string
                    format: date
                  description: Start date (ISO 8601)
                - name: to
                  in: query
                  schema:
                    type: string
                    format: date
                  description: End date (ISO 8601)
                - name: outcome
                  in: query
                  schema:
                    type: string
                    enum: [success, partial, failed, escalated]
                - name: tag
                  in: query
                  schema:
                    type: string
                  description: Filter by tag
            responses:
                "200":
                    description: Episode records
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    episodes:
                                        type: array
                                        items:
                                            $ref: "#/components/schemas/EpisodeRecord"
