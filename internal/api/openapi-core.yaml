                            schema:
                                type: array
                                items:
                                    $ref: "#/components/schemas/Meeseeks"
        delete:
            operationId: killMeeseeksByParent
            summary: Kill all Meeseeks for a parent agent
            tags: [Agents]
            parameters:
                - name: parent
                  in: query
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: Meeseeks terminated
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    status:
                                        type: string
                                    killed:
                                        type: array
                                        items:
                                            type: string
    /agents/meeseeks/{id}:
        get:
            operationId: showMeeseeks
            summary: Show Meeseeks detail
            tags: [Agents]
            parameters:
                - name: id
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: Meeseeks detail
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Meeseeks"
                "404":
                    $ref: "#/components/responses/NotFound"
        delete:
            operationId: killMeeseeks
            summary: Terminate a Meeseeks
            tags: [Agents]
            parameters:
                - name: id
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: Meeseeks terminated
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/StatusResponse"
    /agents/meeseeks/{id}/complete:
        post:
            operationId: completeMeeseeks
            summary: Mark a Meeseeks as completed (called by body runtime)
            tags: [Agents]
            parameters:
                - name: id
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: Meeseeks completed
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/StatusResponse"
    # ── Credentials ─────────────────────────────────────────────────────────────
    /creds:
        post:
            operationId: createOrUpdateCredential
            summary: Store or update a credential
            description: Stores a credential in the encrypted credential store. Idempotent — same name+value is a no-op, different value updates.
            tags: [Creds]
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [name, value, kind, scope, protocol]
                            properties:
                                name: {type: string, description: Credential name (e.g. LC_API_KEY_DETECTION_TUNER)}
                                value: {type: string, description: Credential value (encrypted at rest)}
                                kind: {type: string, enum: [provider, service, gateway, internal, group]}
                                scope: {type: string, description: "platform, agent:{name}, or team:{name}"}
                                protocol: {type: string, enum: [api-key, jwt-exchange, github-app, oauth2, bearer]}
                                service: {type: string, description: Service definition name}
                                group: {type: string, description: Credential group name}
                                external_scopes: {type: array, items: {type: string}}
                                requires: {type: array, items: {type: string}}
                                expires_at: {type: string, format: date-time}
                                protocol_config: {type: object, additionalProperties: true}
            responses:
                "200":
                    description: Credential stored
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    status: {type: string}
                                    name: {type: string}
        get:
            operationId: listCredentials
            summary: List credentials (values redacted)
            tags: [Creds]
            parameters:
                - name: kind
                  in: query
                  schema: {type: string}
                - name: scope
                  in: query
                  schema: {type: string}
                - name: service
                  in: query
                  schema: {type: string}
                - name: group
                  in: query
                  schema: {type: string}
                - name: expiring
                  in: query
                  schema: {type: string}
                  description: Duration string (e.g. 7d) — list credentials expiring within
            responses:
                "200":
                    description: List of credentials with redacted values
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: "#/components/schemas/CredentialEntry"
    /creds/{name}:
        get:
            operationId: showCredential
            summary: Show credential metadata (value redacted unless ?show_value=true)
            tags: [Creds]
            parameters:
                - name: name
                  in: path
                  required: true
                  schema: {type: string}
                - name: show_value
                  in: query
                  schema: {type: boolean, default: false}
                  description: Include plaintext value (high-severity audit event)
            responses:
                "200":
                    description: Credential details
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/CredentialEntry"
                "404":
                    description: Credential not found
        delete:
            operationId: deleteCredential
            summary: Delete a credential
            tags: [Creds]
            parameters:
                - name: name
                  in: path
                  required: true
                  schema: {type: string}
            responses:
                "200":
                    description: Credential deleted
    /creds/{name}/rotate:
        post:
            operationId: rotateCredential
            summary: Rotate credential value (preserves metadata)
            tags: [Creds]
            parameters:
                - name: name
                  in: path
                  required: true
                  schema: {type: string}
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [value]
                            properties:
                                value: {type: string}
            responses:
                "200":
                    description: Credential rotated
    /creds/{name}/test:
        post:
            operationId: testCredential
            summary: Test credential against external API
            tags: [Creds]
            parameters:
                - name: name
                  in: path
                  required: true
                  schema: {type: string}
            responses:
                "200":
                    description: Test result
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    ok: {type: boolean}
                                    status: {type: integer}
                                    message: {type: string}
                                    latency_ms: {type: integer}
    /creds/groups:
        post:
            operationId: createCredentialGroup
            summary: Create a credential group (shared protocol config)
            tags: [Creds]
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [name, protocol]
                            properties:
                                name: {type: string}
                                protocol: {type: string}
                                token_url: {type: string}
                                token_params: {type: object, additionalProperties: {type: string}}
                                requires: {type: array, items: {type: string}}
            responses:
                "200":
                    description: Group created
    # ── Agent Rebuild ──────────────────────────────────────────────────────────
    /admin/agents/{name}/rebuild:
        post:
            operationId: rebuildAgent
            summary: Regenerate all derived files for an agent
            description: |
                Regenerates services-manifest.json, services.yaml, PLATFORM.md,
                FRAMEWORK.md, and AGENTS.md without restarting the agent.
            tags: [Agents]
            parameters:
                - name: name
                  in: path
                  required: true
                  schema: {type: string}
            responses:
                "200":
                    description: Rebuild result
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    status: {type: string, enum: [rebuilt, partial, failed]}
                                    regenerated: {type: array, items: {type: string}}
                                    errors: {type: array, items: {type: string}}
                "404":
                    description: Agent not found
    # ── Agent Cache & Economics ────────────────────────────────────────────────
    /agents/{name}/cache:
        delete:
            operationId: clearAgentCache
            summary: Clear semantic cache for an agent
            tags: [Agents]
            parameters:
                - $ref: "#/components/parameters/agentName"
            responses:
                "200":
                    description: Cache cleared
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/StatusResponse"
                "404":
                    $ref: "#/components/responses/NotFound"
    /agents/{name}/economics:
        get:
            operationId: getAgentEconomics
            summary: Get per-workflow economics rollup for an agent
            tags: [Agents]
            parameters:
                - $ref: "#/components/parameters/agentName"
            responses:
                "200":
                    description: Economics rollup
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: true
                "404":
                    $ref: "#/components/responses/NotFound"
    /agents/economics/summary:
        get:
            operationId: getEconomicsSummary
            summary: Get platform-wide economics summary across all agents
            tags: [Agents]
            responses:
                "200":
                    description: Platform economics summary
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: true
    /admin/registry/list:
        get:
            operationId: registryList
            summary: List principals by type
            tags: [Admin]
            parameters:
                - name: type
                  in: query
                  schema:
                    type: string
                    enum: [operator, agent, team, role, channel]
            responses:
                "200":
                    description: List of principals
    /admin/registry/{uuid}:
        put:
            operationId: registryUpdate
            summary: Update principal fields
            tags: [Admin]
            parameters:
                - name: uuid
                  in: path
                  required: true
                  schema:
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                parent:
                                    type: string
                                status:
                                    type: string
                                    enum: [active, suspended, revoked]
                                permissions:
                                    type: string
            responses:
                "200":
                    description: Updated
        delete:
            operationId: registryDelete
            summary: Delete a principal
            tags: [Admin]
            parameters:
                - name: uuid
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: Deleted
    /admin/registry/{uuid}/effective:
        get:
            operationId: registryEffective
            summary: Compute effective permissions for a principal
            tags: [Admin]
            parameters:
                - name: uuid
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: Effective permissions after hierarchy resolution
# ── WebSocket (outside /api/v1) ─────────────────────────────────────────────
# Note: OpenAPI 3.1 does not natively support WebSocket. Documented as a
# separate server path for completeness.
components:
    securitySchemes:
        apiToken:
            type: apiKey
            in: header
            name: X-Agency-Token
            description: API token generated during `agency init`
        webhookSecret:
            type: apiKey
            in: header
            name: X-Webhook-Secret
            description: Per-webhook secret for inbound webhook authentication
    parameters:
        agentName:
            name: name
            in: path
            required: true
            schema:
                type: string
            description: Agent name
        presetName:
            name: name
            in: path
            required: true
            schema:
                type: string
                pattern: "^[a-z0-9][a-z0-9\\-]{0,63}$"
            description: Preset name (lowercase alphanumeric + hyphens, 1-64 chars)
        nameOrID:
            name: nameOrID
            in: path
            required: true
            schema:
                type: string
            description: Hub instance name or ID
        capabilityName:
            name: name
            in: path
            required: true
            schema:
                type: string
            description: Capability name
        missionName:
            name: name
            in: path
            required: true
            schema:
                type: string
            description: Mission name or ID
    responses:
        NotFound:
            description: Resource not found
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/ErrorResponse"
    schemas:
        StatusResponse:
            type: object
            properties:
                status:
                    type: string
                name:
                    type: string
        ErrorResponse:
            type: object
            properties:
                error:
                    type: string
        GraphMemoryNode:
            type: object
            description: Promoted durable memory graph node.
            properties:
                id:
                    type: string
                    description: Knowledge graph node ID
                label:
                    type: string
                kind:
                    type: string
                    enum: [fact, episode, procedure]
                    description: Graph node kind derived from memory_type
                summary:
                    type: string
                properties:
                    oneOf:
                        - type: object
                          additionalProperties: true
                        - type: string
                    description: JSON object or encoded JSON containing memory_type, provenance, evidence, and approval metadata
                source_type:
                    type: string
                source_channels:
                    oneOf:
                        - type: array
                          items:
                            type: string
                        - type: string
                    description: Source channels as an array or encoded JSON array
                created_at:
                    type: string
                    format: date-time
                updated_at:
                    type: string
                    format: date-time
                curation_status:
                    type: string
                    nullable: true
                curation_reason:
                    type: string
                    nullable: true
                curation_at:
                    type: string
                    nullable: true
                scope:
                    oneOf:
                        - type: object
                          additionalProperties: true
                        - type: string
                    description: Visibility scope as an object or encoded JSON object
        GraphMemoryListResponse:
            type: object
            properties:
                items:
                    type: array
                    items:
                        $ref: "#/components/schemas/GraphMemoryNode"
        GraphMemoryActionRequest:
            type: object
            required: [action]
            properties:
                action:
                    type: string
                    enum: [revoke]
                    description: Lifecycle action to apply to a promoted durable memory
                reason:
                    type: string
                    description: Optional reason for the lifecycle action
        GraphMemoryActionResponse:
            type: object
            properties:
                id:
                    type: string
                    description: Durable memory node ID
                action:
                    type: string
                    enum: [revoke]
        GraphMemoryProposal:
            type: object
            description: Durable-memory proposal graph node.
            properties:
                id:
                    type: string
                    description: Knowledge graph node ID
                label:
                    type: string
                kind:
                    type: string
                    enum: [memory_proposal]
                summary:
                    type: string
                properties:
                    oneOf:
                        - type: object
                          additionalProperties: true
                        - type: string
                    description: JSON object or encoded JSON containing status, memory_type, confidence, evidence, and decision metadata
                source_type:
                    type: string
                source_channels:
                    oneOf:
                        - type: array
                          items:
                            type: string
                        - type: string
                created_at:
                    type: string
                    format: date-time
                updated_at:
