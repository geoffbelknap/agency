                slots. Used by the CLI (`agency infra capacity`) and enforced at agent
                start and meeseeks spawn.
            tags: [Infra]
            x-agency-tier: core
            x-agency-stability: supported
            responses:
                "200":
                    description: Current capacity state
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    host_memory_mb:
                                        type: integer
                                    host_cpu_cores:
                                        type: integer
                                    system_reserve_mb:
                                        type: integer
                                    infra_overhead_mb:
                                        type: integer
                                    max_agents:
                                        type: integer
                                    max_concurrent_meesks:
                                        type: integer
                                    agent_slot_mb:
                                        type: integer
                                    meeseeks_slot_mb:
                                        type: integer
                                    network_pool_configured:
                                        type: boolean
                                    running_agents:
                                        type: integer
                                    running_meeseeks:
                                        type: integer
                                    available_slots:
                                        type: integer
                "503":
                    description: Capacity config not available
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
