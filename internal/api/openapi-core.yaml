                        schema:
                            type: object
                            properties:
                                content:
                                    type: string
                                author:
                                    type: string
            responses:
                "200":
                    description: Message edited
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: true
        delete:
            operationId: deleteMessage
            summary: Delete a message
            tags: [Comms]
            parameters:
                - name: name
                  in: path
                  required: true
