                        application/json:
                            schema:
                                $ref: "#/components/schemas/TrajectoryState"
    /missions/{name}/procedures:
        get:
            operationId: listMissionProcedures
            summary: List procedure records for a mission (across all agents)
            tags: [Agents]
            parameters:
                - $ref: "#/components/parameters/missionName"
