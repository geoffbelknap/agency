                                name:
                                    type: string
                                arguments:
                                    type: object
                                    additionalProperties: true
            responses:
                "200":
                    description: Tool call result
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: true
    # ── Memory ─────────────────────────────────────────────────────────────────
    /agents/{name}/procedures:
