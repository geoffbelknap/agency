          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Profile"
      responses:
        "200":
          description: Profile saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProfile
      summary: Delete a profile
      tags: [Admin]
      x-agency-tier: experimental
      x-agency-stability: experimental
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Profile deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  id:
                    type: string
        "404":
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Internal ────────────────────────────────────────────────────────────────
  /infra/internal/llm:
    post:
      operationId: internalLLM
      summary: Internal LLM proxy for infrastructure components
      description: |
        Proxies LLM calls with model resolution, format translation (Anthropic
        <-> OpenAI), cost tracking under _infrastructure budget, and audit.
        Only authorized callers (X-Agency-Caller header): knowledge-synthesizer,
        analysis-xpia, knowledge-curator.
      tags: [Internal]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, messages]
              properties:
                model:
                  type: string
                messages:
                  type: array
                  items:
                    type: object
                max_tokens:
                  type: integer
                temperature:
                  type: number
      responses:
        "200":
          description: LLM response (OpenAI chat/completions format)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "403":
          description: Unknown infrastructure caller
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Infrastructure LLM budget exhausted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Graph Review (operator-only) ────────────────────────────────────────────
  /graph/pending:
    get:
      operationId: knowledgePending
      summary: List pending knowledge contributions
      description: Returns org-structural knowledge contributions awaiting operator review. Operator-only (ASK tenet 5).
      tags: [Graph]
      x-agency-tier: experimental
      x-agency-stability: experimental
      responses:
        "200":
          description: Pending contributions
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "502":
          description: Knowledge service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /graph/review/{id}:
    post:
      operationId: knowledgeReview
      summary: Approve or reject a knowledge contribution
      description: Approves or rejects a pending org-structural contribution by ID. Operator-only (ASK tenet 5).
      tags: [Graph]
      x-agency-tier: experimental
      x-agency-stability: experimental
      parameters:
        - name: id
          in: path
          required: true
          description: Contribution ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [approve, reject]
                  description: Review action
                reason:
                  type: string
                  description: Optional reason for the review decision
      responses:
        "200":
          description: Review result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          description: Invalid request (missing ID, invalid action, or malformed body)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Knowledge service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /graph/memory:
    get:
      operationId: knowledgeMemories
      summary: List durable memories
      description: Returns promoted durable memories. Operator-only (ASK tenet 5).
      tags: [Graph]
      x-agency-tier: experimental
      x-agency-stability: experimental
      parameters:
        - name: type
          in: query
          required: false
          description: Durable memory type.
          schema:
            type: string
            enum: [semantic, episodic, procedural]
        - name: agent
          in: query
          required: false
          description: Agent that contributed the memory.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Maximum memories to return.
          schema:
            type: integer
            minimum: 1
            maximum: 250
            default: 100
      responses:
        "200":
          description: Durable memories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphMemoryListResponse"
        "400":
          description: Invalid type or limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Knowledge service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /graph/memory/{id}/actions:
    post:
      operationId: knowledgeMemoryAction
      summary: Apply durable memory action
      description: Applies an operator-owned lifecycle action to a promoted durable memory. Operator-only (ASK tenet 5).
      tags: [Graph]
      x-agency-tier: experimental
      x-agency-stability: experimental
      parameters:
        - name: id
          in: path
          required: true
          description: Durable memory node ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GraphMemoryActionRequest"
      responses:
        "200":
          description: Memory action result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphMemoryActionResponse"
        "400":
          description: Invalid request (missing ID, invalid action, or malformed body)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Knowledge service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /graph/memory/proposals:
    get:
      operationId: knowledgeMemoryProposals
      summary: List memory proposals
      description: Returns durable-memory proposals by review status. Operator-only (ASK tenet 5).
      tags: [Graph]
      x-agency-tier: experimental
      x-agency-stability: experimental
      parameters:
        - name: status
          in: query
          required: false
          description: Proposal review status. Defaults to needs_review.
          schema:
            type: string
            enum: [pending_review, needs_review, approved, rejected]
        - name: limit
          in: query
          required: false
          description: Maximum proposals to return.
          schema:
            type: integer
            minimum: 1
            maximum: 250
            default: 100
      responses:
        "200":
          description: Memory proposals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphMemoryProposalListResponse"
        "400":
          description: Invalid status or limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Knowledge service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /graph/memory/proposals/{id}/review:
    post:
      operationId: knowledgeMemoryProposalReview
      summary: Approve or reject a memory proposal
      description: Approves or rejects a durable-memory proposal by ID. Operator-only (ASK tenet 5).
      tags: [Graph]
      x-agency-tier: experimental
      x-agency-stability: experimental
      parameters:
        - name: id
          in: path
          required: true
          description: Memory proposal ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GraphMemoryProposalReviewRequest"
      responses:
        "200":
          description: Memory proposal review result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphMemoryProposalReviewResponse"
        "400":
          description: Invalid request (missing ID, invalid action, or malformed body)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Knowledge service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Intake Polling ────────────────────────────────────────────────────────────
  /hub/intake/poll-health:
    get:
      operationId: intakePollHealth
      summary: Check connector polling health status
      description: Proxies to the intake service to retrieve polling health status for all connectors.
      tags: [Hub]
      responses:
        "200":
          description: Polling health status
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "502":
          description: Intake service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /hub/intake/poll/{connector}:
    post:
      operationId: intakePollTrigger
      summary: Manually trigger a connector poll
      description: Triggers an immediate poll for the specified connector via the intake service.
      tags: [Hub]
      parameters:
        - name: connector
          in: path
          required: true
          description: Connector name
          schema:
            type: string
      responses:
        "200":
          description: Poll triggered
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "502":
          description: Intake service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Credentials ─────────────────────────────────────────────────────────────

  /creds:
    post:
      operationId: createOrUpdateCredential
      summary: Store or update a credential
      description: Stores a credential in the encrypted credential store. Idempotent — same name+value is a no-op, different value updates.
      tags: [Creds]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, value, kind, scope, protocol]
              properties:
                name: { type: string, description: Credential name (e.g. LC_API_KEY_DETECTION_TUNER) }
                value: { type: string, description: Credential value (encrypted at rest) }
                kind: { type: string, enum: [provider, service, gateway, internal, group] }
                scope: { type: string, description: "platform, agent:{name}, or team:{name}" }
                protocol: { type: string, enum: [api-key, jwt-exchange, github-app, oauth2, bearer] }
                service: { type: string, description: Service definition name }
                group: { type: string, description: Credential group name }
                external_scopes: { type: array, items: { type: string } }
                requires: { type: array, items: { type: string } }
                expires_at: { type: string, format: date-time }
                protocol_config: { type: object, additionalProperties: true }
      responses:
        "200":
          description: Credential stored
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  name: { type: string }
    get:
      operationId: listCredentials
      summary: List credentials (values redacted)
      tags: [Creds]
      parameters:
        - name: kind
          in: query
          schema: { type: string }
        - name: scope
          in: query
          schema: { type: string }
        - name: service
          in: query
          schema: { type: string }
        - name: group
          in: query
          schema: { type: string }
        - name: expiring
          in: query
          schema: { type: string }
          description: Duration string (e.g. 7d) — list credentials expiring within
      responses:
        "200":
          description: List of credentials with redacted values
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CredentialEntry"

  /creds/{name}:
    get:
      operationId: showCredential
      summary: Show credential metadata (value redacted unless ?show_value=true)
      tags: [Creds]
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
        - name: show_value
          in: query
          schema: { type: boolean, default: false }
          description: Include plaintext value (high-severity audit event)
      responses:
        "200":
          description: Credential details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CredentialEntry"
        "404":
          description: Credential not found
    delete:
      operationId: deleteCredential
      summary: Delete a credential
      tags: [Creds]
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Credential deleted

  /creds/{name}/rotate:
    post:
      operationId: rotateCredential
      summary: Rotate credential value (preserves metadata)
      tags: [Creds]
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [value]
              properties:
                value: { type: string }
      responses:
        "200":
          description: Credential rotated

  /creds/{name}/test:
    post:
      operationId: testCredential
      summary: Test credential against external API
      tags: [Creds]
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  status: { type: integer }
                  message: { type: string }
                  latency_ms: { type: integer }

  /creds/groups:
    post:
      operationId: createCredentialGroup
      summary: Create a credential group (shared protocol config)
      tags: [Creds]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, protocol]
              properties:
                name: { type: string }
                protocol: { type: string }
                token_url: { type: string }
                token_params: { type: object, additionalProperties: { type: string } }
                requires: { type: array, items: { type: string } }
      responses:
        "200":
          description: Group created

  /creds/internal:
    get:
      operationId: resolveCredential
      summary: Resolve credential for egress (internal, via Unix socket)
      description: |
        Returns decrypted credential value + protocol metadata. Used by the
        egress proxy via the gateway Unix socket. No Bearer auth required on
        the socket path (socket access = authorization). Auth-gated on HTTP.
      tags: [Internal]
      parameters:
        - name: name
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Resolved credential
          content:
            application/json:
              schema:
                type: object
                properties:
                  name: { type: string }
                  value: { type: string }
                  protocol: { type: string }
                  protocol_config: { type: object }
        "404":
          description: Credential not found

  # ── Agent Rebuild ──────────────────────────────────────────────────────────

  /admin/agents/{name}/rebuild:
    post:
      operationId: rebuildAgent
      summary: Regenerate all derived files for an agent
      description: |
        Regenerates services-manifest.json, services.yaml, PLATFORM.md,
        FRAMEWORK.md, and AGENTS.md without restarting the agent.
      tags: [Agents]
      parameters:
        - name: name
          in: path
