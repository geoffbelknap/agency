                type: string
            - type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        scope:
          oneOf:
            - type: object
              additionalProperties: true
            - type: string

    GraphMemoryProposalListResponse:
      type: object
