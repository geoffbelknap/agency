  # ── Internal Event Publishing ────────────────────────────────────────────────
  /events/publish:
    post:
      operationId: publishEvent
      summary: Publish an event to the event bus (internal)
      description: |
        Internal endpoint for infra services (intake, knowledge) to publish
        events to the gateway event bus. Replaces direct service-to-service
        comms calls. Protected by X-Agency-Caller validation on the socket
        router (allowed callers: intake, knowledge).
      tags: [Events]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [source_type, source_name, event_type]
              properties:
                source_type:
                  type: string
                  description: Event source category (e.g., connector, schedule)
                source_name:
                  type: string
                  description: Name of the source (e.g., connector name)
                event_type:
                  type: string
                  description: Type of event being published
                data:
                  type: object
                  additionalProperties: true
                  description: Event payload
                metadata:
                  type: object
                  additionalProperties: true
                  description: Optional metadata
      responses:
        "202":
          description: Event published
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: published
                  event_id:
                    type: string
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Event bus not initialized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

