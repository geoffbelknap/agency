openapi: 3.1.0
info:
  title: Agency Gateway API
  version: 0.1.0
  description: |
    REST API for the Agency AI agent operating platform. Deploys agents in
    enforced isolation containers with credential scoping, network mediation,
    read-only constraints, and continuous audit.

    All endpoints except /health require API token authentication via the
    X-Agency-Token header. Streaming endpoints accept `Accept: application/x-ndjson`.
  license:
    name: Proprietary

servers:
  - url: http://localhost:8200/api/v1
    description: Local gateway daemon

security:
  - apiToken: []

tags:
  - name: Health
    description: Health check and platform initialization
  - name: Agents
    description: Agent lifecycle — create, start, stop, halt, resume, restart, delete
  - name: Budget
    description: Per-agent LLM budget tracking and enforcement
  - name: Context
    description: Mid-session constraint push and policy delivery
  - name: Presets
    description: Agent preset CRUD (user presets shadow built-in)
  - name: Deploy
    description: Pack deployment and teardown
  - name: Policy
    description: Hierarchical policy engine — show and validate
  - name: Hub
    description: Component registry — search, install, configure, activate
  - name: Capabilities
    description: Platform capability registry — enable, disable, grant
  - name: Knowledge
    description: Knowledge graph queries, export, ontology, curation
  - name: Infrastructure
    description: Shared infrastructure lifecycle — up, down, rebuild, reload, status
  - name: Channels
    description: Inter-agent communication channels and messages
  - name: Routing
    description: LLM model routing metrics and configuration
  - name: Admin
    description: Administrative operations — doctor, destroy, trust, audit, egress
  - name: Teams
    description: Agent team management
  - name: Intake
    description: Connector intake pipeline — items, stats, webhook
  - name: Missions
    description: Mission lifecycle — create, assign, pause, resume, complete
  - name: Memory
    description: Agent procedural and episodic memory — procedures, episodes, trajectory
  - name: Meeseeks
    description: Ephemeral sub-agent spawning for delegated tasks
  - name: Events
    description: Platform event bus — list events and subscriptions
  - name: Webhooks
    description: Inbound webhook registration and event delivery
  - name: MCP
    description: MCP tool registry — list and call tools
  - name: Internal
    description: Internal infrastructure LLM proxy
  - name: WebSocket
    description: Real-time WebSocket endpoint (outside /api/v1)

paths:
  # ── Health ──────────────────────────────────────────────────────────────────
  /health:
    get:
      operationId: health
      summary: Health check
      tags: [Health]
      security: []
      responses:
        "200":
          description: Gateway is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                  build_id:
                    type: string

  /init:
    post:
      operationId: initPlatform
      summary: Bootstrap the Agency platform
      tags: [Health]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                operator:
                  type: string
                force:
                  type: boolean
                anthropic_api_key:
                  type: string
                openai_api_key:
                  type: string
      responses:
        "200":
          description: Platform initialized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  # ── Agents ──────────────────────────────────────────────────────────────────
  /agents:
    get:
      operationId: listAgents
      summary: List all agents
      tags: [Agents]
      responses:
        "200":
          description: Array of agent summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentSummary"
    post:
      operationId: createAgent
      summary: Create a new agent
      tags: [Agents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                preset:
                  type: string
                  default: generalist
      responses:
        "201":
          description: Agent created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /agents/{name}:
    get:
      operationId: showAgent
      summary: Show agent detail
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
      responses:
        "200":
          description: Agent detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDetail"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteAgent
      summary: Delete an agent and its containers
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
      responses:
        "200":
          description: Agent deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /agents/{name}/start:
    post:
      operationId: startAgent
      summary: Start an agent (seven-phase sequence)
      description: |
        Runs the seven-phase start sequence: verify, enforcement, constraints,
        workspace, identity, body, session. Supports NDJSON streaming when
        Accept: application/x-ndjson is set.
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
      responses:
        "200":
          description: Agent started (JSON or NDJSON stream)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartResult"
            application/x-ndjson:
              schema:
                description: Stream of phase progress events ending with a complete event

  /agents/{name}/restart:
    post:
      operationId: restartAgent
      summary: Restart an agent with key rotation
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
      responses:
        "200":
          description: Agent restarted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartResult"
        "404":
          $ref: "#/components/responses/NotFound"

  /agents/{name}/stop:
    post:
      operationId: stopAgent
      summary: Stop (halt) an agent
      description: |
        Three-tier halt: supervised (graceful), immediate (SIGTERM), emergency
        (SIGKILL + silent). Emergency halt requires a reason (ASK Tenet 2).
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  enum: [supervised, immediate, emergency]
                  default: supervised
                reason:
                  type: string
                initiator:
                  type: string
      responses:
        "200":
          description: Halt record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HaltRecord"

  /agents/{name}/halt:
    post:
      operationId: haltAgent
      summary: Halt an agent (alias for stop)
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  enum: [supervised, immediate, emergency]
                  default: supervised
                reason:
                  type: string
                initiator:
                  type: string
      responses:
        "200":
          description: Halt record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HaltRecord"

  /agents/{name}/resume:
    post:
      operationId: resumeAgent
      summary: Resume a halted agent
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                initiator:
                  type: string
      responses:
        "200":
          description: Agent resumed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /agents/{name}/grant:
    post:
      operationId: grantAgent
      summary: Grant a capability to an agent
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [capability]
              properties:
                capability:
                  type: string
      responses:
        "200":
          description: Capability granted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  agent:
                    type: string
                  capability:
                    type: string

  /agents/{name}/revoke:
    post:
      operationId: revokeAgent
      summary: Revoke a capability from an agent
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [capability]
              properties:
                capability:
                  type: string
      responses:
        "200":
          description: Capability revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  agent:
                    type: string
                  capability:
                    type: string

  /agents/{name}/signal:
    post:
      operationId: relaySignal
      summary: Relay a body-originated signal via WebSocket
      description: |
        Mediated path: body -> enforcer -> gateway -> WebSocket hub.
        ASK tenet 2: every action leaves a trace.
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [signal_type]
              properties:
                signal_type:
                  type: string
                data:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          description: Signal relayed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /agents/{name}/channels:
    get:
      operationId: agentChannels
      summary: List channels an agent is a member of
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
      responses:
        "200":
          description: Array of channels
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /agents/{name}/results:
    get:
      operationId: listResults
      summary: List task results in agent workspace
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
      responses:
        "200":
          description: Array of result identifiers
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    task_id:
                      type: string

  /agents/{name}/results/{taskId}:
    get:
      operationId: getResult
      summary: Get a task result document
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
        - name: taskId
          in: path
          required: true
          schema:
            type: string
        - name: download
          in: query
          schema:
            type: string
            enum: ["true", "false"]
      responses:
        "200":
          description: Markdown result document
          content:
            text/markdown:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/NotFound"

  /agents/{name}/config:
    get:
      operationId: getAgentConfig
      summary: Get full agent config bundle
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
      responses:
        "200":
          description: Agent configuration bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentConfigBundle"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateAgentConfig
      summary: Partially update agent config
      description: |
        Accepts partial updates — only fields present in the request body are
        updated. ASK tenet 6: constraint changes trigger enforcer reload so the
        agent sees old or new, never a mix.
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                agent_yaml:
                  type: object
                  additionalProperties: true
                identity:
                  type: string
                  nullable: true
                constraints:
                  type: object
                  additionalProperties: true
                workspace:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          description: Updated config bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentConfigBundle"
        "404":
          $ref: "#/components/responses/NotFound"

  /agents/{name}/logs:
    get:
      operationId: agentLogs
      summary: Get agent audit logs
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
        - name: since
          in: query
          schema:
            type: string
            format: date-time
        - name: until
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Array of audit log entries (max 500)
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true

  # ── Budget ──────────────────────────────────────────────────────────────────
  /agents/{name}/budget:
    get:
      operationId: getBudget
      summary: Get agent budget usage (computed from audit logs)
      description: |
        Returns daily and monthly usage with limits and remaining budget.
        Usage is computed from enforcer audit logs (same source as routing metrics).
        No separate budget recording needed — costs are derived from LLM call logs.
      tags: [Budget]
      parameters:
        - $ref: "#/components/parameters/agentName"
      responses:
        "200":
          description: Budget state
          content:
            application/json:
              schema:
                type: object
                properties:
                  agent_name:
                    type: string
                  daily_used:
                    type: number
                    format: double
                  daily_limit:
                    type: number
                    format: double
                  daily_remaining:
                    type: number
                    format: double
                  monthly_used:
                    type: number
                    format: double
                  monthly_limit:
                    type: number
                    format: double
                  monthly_remaining:
                    type: number
                    format: double
                  per_task_limit:
                    type: number
                    format: double
                  today_llm_calls:
                    type: integer
                  today_input_tokens:
                    type: integer
                    format: int64
                  today_output_tokens:
                    type: integer
                    format: int64

  /agents/{name}/budget/remaining:
    get:
      operationId: getBudgetRemaining
      summary: Get remaining budget (lightweight)
      tags: [Budget]
      parameters:
        - $ref: "#/components/parameters/agentName"
      responses:
        "200":
          description: Remaining budget
          content:
            application/json:
              schema:
                type: object
                properties:
                  daily_used:
                    type: number
                    format: double
                  daily_limit:
                    type: number
                    format: double
                  daily_remaining:
                    type: number
                    format: double
                  monthly_used:
                    type: number
                    format: double
                  monthly_limit:
                    type: number
                    format: double
                  monthly_remaining:
                    type: number
                    format: double

  # ── Context ─────────────────────────────────────────────────────────────────
  /agents/{name}/context/constraints:
    get:
      operationId: getConstraints
      summary: Get current acknowledged constraints for an agent
      tags: [Context]
      parameters:
        - $ref: "#/components/parameters/agentName"
      responses:
        "200":
          description: Current constraints
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /agents/{name}/context/policy:
    get:
      operationId: getContextPolicy
      summary: Get agent name and current constraints
      tags: [Context]
      parameters:
        - $ref: "#/components/parameters/agentName"
      responses:
        "200":
          description: Agent policy view
          content:
            application/json:
              schema:
                type: object
                properties:
                  agent:
                    type: string
                  constraints:
                    type: object
                    additionalProperties: true

  /agents/{name}/context/exceptions:
    get:
      operationId: getExceptions
      summary: Get exceptions (currently returns empty list)
      tags: [Context]
      parameters:
        - $ref: "#/components/parameters/agentName"
      responses:
        "200":
          description: Empty exception list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /agents/{name}/context/changes:
    get:
      operationId: getChanges
      summary: Get full constraint change history
      tags: [Context]
      parameters:
        - $ref: "#/components/parameters/agentName"
      responses:
        "200":
          description: Array of constraint changes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConstraintChange"

  /agents/{name}/context/push:
    post:
      operationId: pushConstraints
      summary: Push new constraints to a running agent
      description: |
        Validates the request, calls Manager.Push, triggers async delivery to
        the agent's enforcer via WebSocket. Two-stage timeout handles alerting
        and auto-halt for unacknowledged changes.
      tags: [Context]
      parameters:
        - $ref: "#/components/parameters/agentName"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [constraints, reason]
              properties:
                constraints:
                  type: object
                  additionalProperties: true
                severity_override:
                  type: string
                reason:
                  type: string
                initiator:
                  type: string
                  default: operator
      responses:
        "202":
          description: Constraint push accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  change_id:
                    type: string
                  version:
                    type: integer
                  severity:
                    type: string
                  status:
                    type: string
                  ack_timeout_seconds:
                    type: integer

  /agents/{name}/context/status:
    get:
      operationId: getContextStatus
      summary: Get latest constraint change status
      tags: [Context]
      parameters:
        - $ref: "#/components/parameters/agentName"
      responses:
        "200":
          description: Latest change status or no_changes
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ConstraintChange"
                  - type: object
                    properties:
                      status:
                        type: string
                        example: no_changes

  # ── Presets ─────────────────────────────────────────────────────────────────
  /presets:
    get:
      operationId: listPresets
      summary: List all presets (user presets shadow built-in)
      tags: [Presets]
      responses:
        "200":
          description: Merged list of presets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PresetInfo"
    post:
      operationId: createPreset
      summary: Create a new user preset
      tags: [Presets]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PresetFull"
      responses:
        "201":
          description: Preset created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "409":
          description: Preset already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /presets/{name}:
    get:
      operationId: getPreset
      summary: Get full preset content
      tags: [Presets]
      parameters:
        - $ref: "#/components/parameters/presetName"
      responses:
        "200":
          description: Full preset document with source
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PresetFull"
                  - type: object
                    properties:
                      source:
                        type: string
                        enum: [built-in, user]
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updatePreset
      summary: Update a user preset (built-in are read-only)
      tags: [Presets]
      parameters:
        - $ref: "#/components/parameters/presetName"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PresetFull"
      responses:
        "200":
          description: Preset updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "403":
          description: Built-in presets are read-only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deletePreset
      summary: Delete a user preset
      tags: [Presets]
      parameters:
        - $ref: "#/components/parameters/presetName"
      responses:
        "200":
          description: Preset deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "403":
          description: Built-in presets are read-only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Deploy ──────────────────────────────────────────────────────────────────
  /deploy:
    post:
      operationId: deployPack
      summary: Deploy an agent pack
      tags: [Deploy]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pack_path:
                  type: string
                pack:
                  type: object
                  description: Inline pack definition
                dry_run:
                  type: boolean
                credentials:
                  type: object
                  additionalProperties:
                    type: string
      responses:
        "200":
          description: Deploy result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /teardown/{pack}:
    post:
      operationId: teardownPack
      summary: Tear down a deployed pack
      tags: [Deploy]
      parameters:
        - name: pack
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                delete:
                  type: boolean
      responses:
        "200":
          description: Pack torn down
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  # ── Policy ──────────────────────────────────────────────────────────────────
  /policy/{agent}:
    get:
      operationId: showPolicy
      summary: Show effective policy for an agent
      tags: [Policy]
      parameters:
        - name: agent
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Effective policy
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /policy/{agent}/validate:
    post:
      operationId: validatePolicy
      summary: Validate policy for an agent including hard floor enforcement
      tags: [Policy]
      parameters:
        - name: agent
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Policy is valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyValidation"
        "400":
          description: Policy has violations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyValidation"

  # ── Hub ─────────────────────────────────────────────────────────────────────
  /hub/update:
    post:
      operationId: hubUpdate
      summary: Refresh hub sources (does not upgrade)
      description: |
        Git-pulls all configured hub sources into hub-cache.
        Returns source diffs and available upgrades. Does NOT sync
        managed files or upgrade components — use /hub/upgrade for that.
      tags: [Hub]
      responses:
        "200":
          description: Update report with source diffs and available upgrades
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateReport"

  /hub/outdated:
    get:
      operationId: hubOutdated
      summary: Show available upgrades from current cache
      description: |
        Compares installed component versions and managed file hashes
        against the hub cache. No network access, no writes.
      tags: [Hub]
      responses:
        "200":
          description: List of available upgrades
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AvailableUpgrade"

  /hub/upgrade:
    post:
      operationId: hubUpgrade
      summary: Apply available upgrades
      description: |
        Syncs managed files and upgrades installed components.
        With no body or empty components list, upgrades everything.
        With specific component names, upgrades only those (no managed file sync).
      tags: [Hub]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                components:
                  type: array
                  items:
                    type: string
                  description: Specific components to upgrade (omit to upgrade all)
      responses:
        "200":
          description: Upgrade report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpgradeReport"

  /hub/search:
    get:
      operationId: hubSearch
      summary: Search hub components
      tags: [Hub]
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: kind
          in: query
          schema:
            type: string
      responses:
        "200":
