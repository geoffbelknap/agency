          description: Rebuild result
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [rebuilt, partial, failed] }
                  regenerated: { type: array, items: { type: string } }
                  errors: { type: array, items: { type: string } }
        "404":
          description: Agent not found

