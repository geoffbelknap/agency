                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  auth:
                    type: object
                    additionalProperties: true
                  egress_domains:
                    type: array
                    items:
                      type: string
        "404":
          $ref: "#/components/responses/NotFound"

