  # ── Missions ────────────────────────────────────────────────────────────────
  /missions:
    post:
      operationId: createMission
      summary: Create a new mission
      tags: [Missions]
      requestBody:
        required: true
        content:
          application/x-yaml:
            schema:
              type: object
              description: Mission definition in YAML
      responses:
        "201":
          description: Mission created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mission"
    get:
      operationId: listMissions
      summary: List all missions
      tags: [Missions]
      responses:
        "200":
          description: Mission list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Mission"

  /missions/{name}:
    get:
      operationId: showMission
      summary: Show mission detail
      tags: [Missions]
      parameters:
        - $ref: "#/components/parameters/missionName"
      responses:
        "200":
          description: Mission detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mission"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateMission
      summary: Update a mission
      tags: [Missions]
      parameters:
        - $ref: "#/components/parameters/missionName"
      requestBody:
        required: true
        content:
          application/x-yaml:
            schema:
              type: object
              description: Updated mission definition in YAML
      responses:
        "200":
          description: Mission updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mission"
    delete:
      operationId: deleteMission
      summary: Delete a mission
      tags: [Missions]
      parameters:
        - $ref: "#/components/parameters/missionName"
      responses:
        "200":
          description: Mission deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /missions/{name}/assign:
    post:
      operationId: assignMission
      summary: Assign a mission to an agent or team
      description: |
        Returns 422 with structured pre-flight result when checks fail.
        ASK tenet 11: delegation cannot exceed delegator scope.
      tags: [Missions]
      parameters:
        - $ref: "#/components/parameters/missionName"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target]
              properties:
                target:
                  type: string
                type:
                  type: string
                  enum: [agent, team]
                  default: agent
      responses:
        "200":
          description: Mission assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "422":
          description: Pre-flight checks failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  preflight:
                    type: object

  /missions/{name}/pause:
    post:
      operationId: pauseMission
      summary: Pause a mission
      tags: [Missions]
      parameters:
        - $ref: "#/components/parameters/missionName"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        "200":
          description: Mission paused
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /missions/{name}/resume:
    post:
      operationId: resumeMission
      summary: Resume a paused mission
      tags: [Missions]
      parameters:
        - $ref: "#/components/parameters/missionName"
      responses:
        "200":
          description: Mission resumed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /missions/{name}/complete:
    post:
      operationId: completeMission
      summary: Mark a mission as completed
      tags: [Missions]
      parameters:
        - $ref: "#/components/parameters/missionName"
      responses:
        "200":
          description: Mission completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /missions/{name}/history:
    get:
      operationId: missionHistory
      summary: Get mission history entries
      tags: [Missions]
      parameters:
        - $ref: "#/components/parameters/missionName"
      responses:
        "200":
          description: History entries
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true

  /missions/health:
    get:
      operationId: allMissionsHealth
      summary: Health check for all active missions
      description: |
        Returns health status for all active/paused missions. Each mission
        is checked for connector state, credential presence, agent deployment,
        and schedule configuration.
      tags: [Missions]
      responses:
        "200":
          description: Health reports for all active missions
          content:
            application/json:
              schema:
                type: object
                properties:
                  missions:
                    type: array
                    items:
                      $ref: "#/components/schemas/MissionHealthResponse"

