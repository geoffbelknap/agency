      tags: [Events]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Webhook with new secret
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"

  /events/webhook/{name}:
    post:
      operationId: receiveWebhook
      summary: Inbound webhook receiver
      description: |
        Validates X-Webhook-Secret header (constant-time comparison),
        rate limited to 60 req/min per webhook.
      tags: [Events]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      security:
        - webhookSecret: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "202":
          description: Event accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  event_id:
                    type: string
                  status:
                    type: string
        "401":
          description: Invalid secret
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Notifications ──────────────────────────────────────────────────────────
  /events/notifications:
    get:
      operationId: listNotifications
      summary: List notification destinations
      description: Returns all configured notification destinations. Headers are redacted from responses.
      tags: [Events]
      responses:
        "200":
          description: List of notification destinations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NotificationDestination"
    post:
      operationId: addNotification
      summary: Add a notification destination
      description: |
        Add a new notification destination. Type is auto-detected from URL if omitted
        (ntfy.sh URLs → ntfy, others → webhook). Events default to
        operator_alert, enforcer_exited, mission_health_alert.
      tags: [Events]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, url]
              properties:
                name:
                  type: string
                  description: Unique name for this destination
                type:
                  type: string
                  enum: [ntfy, webhook]
                  description: Auto-detected from URL if omitted
                url:
                  type: string
                  description: Notification URL (ntfy or webhook)
                events:
                  type: array
                  items:
                    type: string
                  description: Event types to subscribe to
                headers:
                  type: object
                  additionalProperties:
                    type: string
                  description: Custom headers for webhook requests
      responses:
        "201":
          description: Destination created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationConfig"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Name already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /events/notifications/{name}:
    get:
      operationId: showNotification
      summary: Show notification destination
      description: Returns a single notification destination by name. Headers are redacted.
      tags: [Events]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Notification destination
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationDestination"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteNotification
      summary: Remove a notification destination
      description: Removes the destination and its event bus subscriptions.
      tags: [Events]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Destination removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  name:
                    type: string
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /events/notifications/{name}/test:
    post:
      operationId: testNotification
      summary: Send a test notification
      description: |
        Publishes a synthetic operator_alert event with category=test and
        severity=info through the full delivery pipeline.
      tags: [Events]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Test event sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  event_id:
                    type: string
                  status:
                    type: string
        "404":
          description: Destination not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Profiles ────────────────────────────────────────────────────────────────
  /admin/profiles:
