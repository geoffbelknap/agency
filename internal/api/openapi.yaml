                    type: string

  /admin/registry/resolve:
    get:
      operationId: registryResolve
      summary: Resolve principal by UUID or type+name
      tags: [Admin]
      x-agency-tier: experimental
      x-agency-stability: experimental
      parameters:
        - name: uuid
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
        - name: name
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Principal details
        "404":
          description: Not found

  /admin/registry/list:
    get:
      operationId: registryList
      summary: List principals by type
      tags: [Admin]
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [operator, agent, team, role, channel]
      responses:
        "200":
          description: List of principals

  /admin/registry/{uuid}:
    put:
      operationId: registryUpdate
      summary: Update principal fields
      tags: [Admin]
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                parent:
                  type: string
                status:
                  type: string
                  enum: [active, suspended, revoked]
                permissions:
                  type: string
      responses:
        "200":
          description: Updated
    delete:
      operationId: registryDelete
      summary: Delete a principal
      tags: [Admin]
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted

  /admin/registry/{uuid}/effective:
    get:
      operationId: registryEffective
      summary: Compute effective permissions for a principal
      tags: [Admin]
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Effective permissions after hierarchy resolution

# ── WebSocket (outside /api/v1) ─────────────────────────────────────────────
# Note: OpenAPI 3.1 does not natively support WebSocket. Documented as a
# separate server path for completeness.

components:
  securitySchemes:
    apiToken:
      type: apiKey
      in: header
      name: X-Agency-Token
      description: API token generated during `agency init`
    webhookSecret:
      type: apiKey
      in: header
      name: X-Webhook-Secret
      description: Per-webhook secret for inbound webhook authentication

  parameters:
    agentName:
      name: name
      in: path
      required: true
      schema:
        type: string
      description: Agent name
    presetName:
      name: name
      in: path
      required: true
      schema:
        type: string
        pattern: "^[a-z0-9][a-z0-9\\-]{0,63}$"
      description: Preset name (lowercase alphanumeric + hyphens, 1-64 chars)
    nameOrID:
      name: nameOrID
      in: path
      required: true
      schema:
        type: string
      description: Hub instance name or ID
    capabilityName:
      name: name
      in: path
      required: true
      schema:
        type: string
      description: Capability name
    missionName:
      name: name
      in: path
      required: true
      schema:
        type: string
      description: Mission name or ID

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    StatusResponse:
      type: object
      properties:
        status:
          type: string
        name:
          type: string

    ErrorResponse:
      type: object
      properties:
        error:
          type: string

    GraphMemoryNode:
      type: object
      description: Promoted durable memory graph node.
      properties:
        id:
          type: string
          description: Knowledge graph node ID
        label:
          type: string
        kind:
          type: string
          enum: [fact, episode, procedure]
          description: Graph node kind derived from memory_type
        summary:
          type: string
        properties:
          oneOf:
            - type: object
              additionalProperties: true
            - type: string
          description: JSON object or encoded JSON containing memory_type, provenance, evidence, and approval metadata
        source_type:
          type: string
        source_channels:
          oneOf:
            - type: array
              items:
                type: string
            - type: string
          description: Source channels as an array or encoded JSON array
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        curation_status:
          type: string
          nullable: true
        curation_reason:
          type: string
          nullable: true
        curation_at:
          type: string
          nullable: true
        scope:
          oneOf:
            - type: object
              additionalProperties: true
            - type: string
          description: Visibility scope as an object or encoded JSON object

    GraphMemoryListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/GraphMemoryNode"

    GraphMemoryActionRequest:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [revoke]
          description: Lifecycle action to apply to a promoted durable memory
        reason:
          type: string
          description: Optional reason for the lifecycle action

    GraphMemoryActionResponse:
      type: object
      properties:
        id:
          type: string
          description: Durable memory node ID
        action:
          type: string
          enum: [revoke]

    GraphMemoryProposal:
      type: object
      description: Durable-memory proposal graph node.
      properties:
        id:
          type: string
          description: Knowledge graph node ID
        label:
          type: string
        kind:
          type: string
          enum: [memory_proposal]
        summary:
          type: string
        properties:
          oneOf:
            - type: object
              additionalProperties: true
            - type: string
          description: JSON object or encoded JSON containing status, memory_type, confidence, evidence, and decision metadata
        source_type:
          type: string
        source_channels:
          oneOf:
            - type: array
