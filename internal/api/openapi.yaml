      summary: Run security guarantee checks on all running agents
      description: |
        Runs 7 checks per agent: credentials isolated, network mediation,
        constraints read-only, enforcer audit active, audit not writable,
        halt functional, operator override available.

        The report is structured as runtime checks plus backend-specific
        hygiene checks. For the Docker backend, Docker warnings should be read
        as substrate hygiene, not as generic runtime contract failure.
      tags: [Admin]
      x-agency-tier: core
      x-agency-stability: supported
      responses:
        "200":
          description: Doctor report
          content:
            application/json:
              schema:
