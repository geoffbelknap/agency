          description: Evaluation results with summary stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  mission:
                    type: string
                  evaluations:
                    type: array
                    items:
                      $ref: "#/components/schemas/EvaluationResult"
                  summary:
                    type: object
                    properties:
                      total:
                        type: integer
                      passed:
                        type: integer
                      failed:
                        type: integer
                      pass_rate:
                        type: number

  # ── Meeseeks ────────────────────────────────────────────────────────────────
  /meeseeks:
    post:
      operationId: spawnMeeseeks
      summary: Spawn an ephemeral Meeseeks sub-agent
      tags: [Meeseeks]
      parameters:
        - name: parent
          in: query
          description: Parent agent name
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MeeseeksSpawnRequest"
      responses:
        "201":
          description: Meeseeks spawned
          content:
            application/json:
              schema:
                type: object
                properties:
                  meeseeks_id:
                    type: string
                  status:
                    type: string
        "429":
          description: Spawn rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listMeeseeks
      summary: List Meeseeks (optionally filtered by parent)
      tags: [Meeseeks]
      parameters:
        - name: parent
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Meeseeks list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Meeseeks"
    delete:
      operationId: killMeeseeksByParent
      summary: Kill all Meeseeks for a parent agent
      tags: [Meeseeks]
      parameters:
        - name: parent
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Meeseeks terminated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  killed:
                    type: array
                    items:
                      type: string

  /meeseeks/{id}:
    get:
      operationId: showMeeseeks
      summary: Show Meeseeks detail
      tags: [Meeseeks]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Meeseeks detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meeseeks"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: killMeeseeks
      summary: Terminate a Meeseeks
      tags: [Meeseeks]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Meeseeks terminated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /meeseeks/{id}/complete:
    post:
      operationId: completeMeeseeks
      summary: Mark a Meeseeks as completed (called by body runtime)
      tags: [Meeseeks]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Meeseeks completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  # ── Events ──────────────────────────────────────────────────────────────────
  /events:
    get:
      operationId: listEvents
      summary: List recent events from the event bus
      tags: [Events]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: source_type
          in: query
          schema:
            type: string
        - name: source_name
          in: query
          schema:
            type: string
        - name: event_type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Event list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"

  /events/{id}:
    get:
      operationId: showEvent
      summary: Show event detail
      tags: [Events]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Event detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "404":
          $ref: "#/components/responses/NotFound"

  /subscriptions:
    get:
      operationId: listSubscriptions
      summary: List active event subscriptions
      tags: [Events]
      responses:
        "200":
          description: Subscription list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true

  # ── Webhooks ────────────────────────────────────────────────────────────────
  /webhooks:
    post:
      operationId: createWebhook
      summary: Register a new inbound webhook
      tags: [Webhooks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, event_type]
              properties:
                name:
                  type: string
                event_type:
                  type: string
      responses:
        "201":
          description: Webhook created (includes secret and URL)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"
    get:
      operationId: listWebhooks
      summary: List registered webhooks (secrets redacted)
      tags: [Webhooks]
      responses:
        "200":
          description: Webhook list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    event_type:
                      type: string
                    created_at:
                      type: string
                    url:
                      type: string

  /webhooks/{name}:
    get:
      operationId: showWebhook
      summary: Show webhook detail (includes secret)
      tags: [Webhooks]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Webhook detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteWebhook
      summary: Delete a webhook
      tags: [Webhooks]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Webhook deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /webhooks/{name}/rotate-secret:
    post:
      operationId: rotateWebhookSecret
      summary: Rotate webhook secret
      tags: [Webhooks]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Webhook with new secret
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"

  /events/webhook/{name}:
    post:
      operationId: receiveWebhook
      summary: Inbound webhook receiver
      description: |
        Validates X-Webhook-Secret header (constant-time comparison),
        rate limited to 60 req/min per webhook.
      tags: [Webhooks]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      security:
        - webhookSecret: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "202":
          description: Event accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  event_id:
                    type: string
                  status:
                    type: string
        "401":
          description: Invalid secret
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Notifications ──────────────────────────────────────────────────────────
  /notifications:
    get:
      operationId: listNotifications
      summary: List notification destinations
      description: Returns all configured notification destinations. Headers are redacted from responses.
      tags: [Notifications]
      responses:
        "200":
          description: List of notification destinations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NotificationDestination"
    post:
      operationId: addNotification
      summary: Add a notification destination
      description: |
        Add a new notification destination. Type is auto-detected from URL if omitted
        (ntfy.sh URLs → ntfy, others → webhook). Events default to
        operator_alert, enforcer_exited, mission_health_alert.
      tags: [Notifications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, url]
              properties:
                name:
                  type: string
                  description: Unique name for this destination
                type:
                  type: string
                  enum: [ntfy, webhook]
                  description: Auto-detected from URL if omitted
                url:
                  type: string
                  description: Notification URL (ntfy or webhook)
                events:
                  type: array
                  items:
                    type: string
                  description: Event types to subscribe to
                headers:
                  type: object
                  additionalProperties:
                    type: string
                  description: Custom headers for webhook requests
      responses:
        "201":
          description: Destination created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationConfig"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Name already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notifications/{name}:
    get:
      operationId: showNotification
      summary: Show notification destination
      description: Returns a single notification destination by name. Headers are redacted.
      tags: [Notifications]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Notification destination
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationDestination"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteNotification
      summary: Remove a notification destination
      description: Removes the destination and its event bus subscriptions.
      tags: [Notifications]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Destination removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  name:
                    type: string
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notifications/{name}/test:
    post:
      operationId: testNotification
      summary: Send a test notification
      description: |
        Publishes a synthetic operator_alert event with category=test and
        severity=info through the full delivery pipeline.
      tags: [Notifications]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Test event sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  event_id:
                    type: string
                  status:
                    type: string
        "404":
          description: Destination not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Internal ────────────────────────────────────────────────────────────────
  /internal/llm:
    post:
      operationId: internalLLM
      summary: Internal LLM proxy for infrastructure components
      description: |
        Proxies LLM calls with model resolution, format translation (Anthropic
        <-> OpenAI), cost tracking under _infrastructure budget, and audit.
        Only authorized callers (X-Agency-Caller header): knowledge-synthesizer,
        analysis-xpia, knowledge-curator.
      tags: [Internal]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, messages]
              properties:
                model:
                  type: string
                messages:
                  type: array
                  items:
                    type: object
                max_tokens:
                  type: integer
                temperature:
                  type: number
      responses:
        "200":
          description: LLM response (OpenAI chat/completions format)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "403":
          description: Unknown infrastructure caller
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Infrastructure LLM budget exhausted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Knowledge Review (operator-only) ────────────────────────────────────────
  /knowledge/pending:
    get:
      operationId: knowledgePending
      summary: List pending knowledge contributions
      description: Returns org-structural knowledge contributions awaiting operator review. Operator-only (ASK tenet 5).
      tags: [Knowledge]
      responses:
        "200":
          description: Pending contributions
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "502":
          description: Knowledge service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /knowledge/review/{id}:
    post:
      operationId: knowledgeReview
      summary: Approve or reject a knowledge contribution
      description: Approves or rejects a pending org-structural contribution by ID. Operator-only (ASK tenet 5).
      tags: [Knowledge]
      parameters:
        - name: id
          in: path
          required: true
          description: Contribution ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [approve, reject]
                  description: Review action
                reason:
                  type: string
                  description: Optional reason for the review decision
      responses:
        "200":
          description: Review result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          description: Invalid request (missing ID, invalid action, or malformed body)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Knowledge service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Intake Polling ────────────────────────────────────────────────────────────
  /intake/poll-health:
    get:
      operationId: intakePollHealth
      summary: Check connector polling health status
      description: Proxies to the intake service to retrieve polling health status for all connectors.
      tags: [Intake]
      responses:
        "200":
          description: Polling health status
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "502":
          description: Intake service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /intake/poll/{connector}:
    post:
      operationId: intakePollTrigger
      summary: Manually trigger a connector poll
      description: Triggers an immediate poll for the specified connector via the intake service.
      tags: [Intake]
      parameters:
        - name: connector
          in: path
          required: true
          description: Connector name
          schema:
            type: string
      responses:
        "200":
          description: Poll triggered
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "502":
          description: Intake service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Credentials ─────────────────────────────────────────────────────────────

  /credentials:
    post:
      operationId: createOrUpdateCredential
      summary: Store or update a credential
      description: Stores a credential in the encrypted credential store. Idempotent — same name+value is a no-op, different value updates.
      tags: [Credentials]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, value, kind, scope, protocol]
              properties:
                name: { type: string, description: Credential name (e.g. LC_API_KEY_DETECTION_TUNER) }
                value: { type: string, description: Credential value (encrypted at rest) }
                kind: { type: string, enum: [provider, service, gateway, internal, group] }
                scope: { type: string, description: "platform, agent:{name}, or team:{name}" }
                protocol: { type: string, enum: [api-key, jwt-exchange, github-app, oauth2, bearer] }
                service: { type: string, description: Service definition name }
                group: { type: string, description: Credential group name }
                external_scopes: { type: array, items: { type: string } }
                requires: { type: array, items: { type: string } }
                expires_at: { type: string, format: date-time }
                protocol_config: { type: object, additionalProperties: true }
      responses:
        "200":
          description: Credential stored
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  name: { type: string }
    get:
      operationId: listCredentials
      summary: List credentials (values redacted)
      tags: [Credentials]
      parameters:
        - name: kind
          in: query
          schema: { type: string }
        - name: scope
          in: query
          schema: { type: string }
        - name: service
          in: query
          schema: { type: string }
        - name: group
          in: query
          schema: { type: string }
        - name: expiring
          in: query
          schema: { type: string }
          description: Duration string (e.g. 7d) — list credentials expiring within
      responses:
        "200":
          description: List of credentials with redacted values
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CredentialEntry"

  /credentials/{name}:
    get:
      operationId: showCredential
      summary: Show credential metadata (value redacted unless ?show_value=true)
      tags: [Credentials]
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
        - name: show_value
          in: query
          schema: { type: boolean, default: false }
          description: Include plaintext value (high-severity audit event)
      responses:
        "200":
          description: Credential details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CredentialEntry"
        "404":
          description: Credential not found
    delete:
      operationId: deleteCredential
      summary: Delete a credential
      tags: [Credentials]
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Credential deleted

  /credentials/{name}/rotate:
    post:
      operationId: rotateCredential
      summary: Rotate credential value (preserves metadata)
      tags: [Credentials]
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [value]
              properties:
                value: { type: string }
      responses:
        "200":
          description: Credential rotated

  /credentials/{name}/test:
    post:
      operationId: testCredential
      summary: Test credential against external API
      tags: [Credentials]
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  status: { type: integer }
                  message: { type: string }
                  latency_ms: { type: integer }

  /credentials/groups:
    post:
      operationId: createCredentialGroup
      summary: Create a credential group (shared protocol config)
      tags: [Credentials]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, protocol]
              properties:
                name: { type: string }
                protocol: { type: string }
                token_url: { type: string }
                token_params: { type: object, additionalProperties: { type: string } }
                requires: { type: array, items: { type: string } }
      responses:
        "200":
          description: Group created

  /internal/credentials/resolve:
    get:
      operationId: resolveCredential
      summary: Resolve credential for egress (internal, via Unix socket)
      description: |
        Returns decrypted credential value + protocol metadata. Used by the
        egress proxy via the gateway Unix socket. No Bearer auth required on
        the socket path (socket access = authorization). Auth-gated on HTTP.
      tags: [Internal]
      parameters:
        - name: name
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Resolved credential
          content:
            application/json:
              schema:
                type: object
                properties:
                  name: { type: string }
                  value: { type: string }
                  protocol: { type: string }
                  protocol_config: { type: object }
        "404":
          description: Credential not found

  # ── Agent Rebuild ──────────────────────────────────────────────────────────

  /agents/{name}/rebuild:
    post:
      operationId: rebuildAgent
      summary: Regenerate all derived files for an agent
      description: |
        Regenerates services-manifest.json, services.yaml, PLATFORM.md,
        FRAMEWORK.md, and AGENTS.md without restarting the agent.
      tags: [Agents]
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Rebuild result
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [rebuilt, partial, failed] }
                  regenerated: { type: array, items: { type: string } }
                  errors: { type: array, items: { type: string } }
        "404":
          description: Agent not found

# ── WebSocket (outside /api/v1) ─────────────────────────────────────────────
# Note: OpenAPI 3.1 does not natively support WebSocket. Documented as a
# separate server path for completeness.

components:
  securitySchemes:
    apiToken:
      type: apiKey
      in: header
      name: X-Agency-Token
      description: API token generated during `agency init`
    webhookSecret:
      type: apiKey
      in: header
      name: X-Webhook-Secret
      description: Per-webhook secret for inbound webhook authentication

  parameters:
    agentName:
      name: name
      in: path
      required: true
      schema:
        type: string
      description: Agent name
    presetName:
      name: name
      in: path
      required: true
      schema:
        type: string
        pattern: "^[a-z0-9][a-z0-9\\-]{0,63}$"
      description: Preset name (lowercase alphanumeric + hyphens, 1-64 chars)
    nameOrID:
      name: nameOrID
      in: path
      required: true
      schema:
        type: string
      description: Hub instance name or ID
    capabilityName:
      name: name
      in: path
      required: true
      schema:
        type: string
      description: Capability name
    missionName:
      name: name
      in: path
      required: true
      schema:
        type: string
      description: Mission name or ID

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    StatusResponse:
      type: object
      properties:
        status:
          type: string
        name:
          type: string

    ErrorResponse:
      type: object
      properties:
        error:
          type: string

    CredentialEntry:
      type: object
      properties:
        name: { type: string }
        value: { type: string, description: "[redacted] unless show_value=true" }
        kind: { type: string, enum: [provider, service, gateway, internal, group] }
        scope: { type: string }
        protocol: { type: string }
        service: { type: string }
        group: { type: string }
        external_scopes: { type: array, items: { type: string } }
        requires: { type: array, items: { type: string } }
        expires_at: { type: string, format: date-time }
        protocol_config: { type: object, additionalProperties: true }
        source: { type: string }
        created_at: { type: string, format: date-time }
        rotated_at: { type: string, format: date-time }

    AgentSummary:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
        preset:
          type: string

    AgentDetail:
      type: object
      properties:
        name:
          type: string
        status:
