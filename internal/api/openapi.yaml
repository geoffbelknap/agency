        configuration. Returns per-check results with fix suggestions.
      tags: [Missions]
      parameters:
        - $ref: "#/components/parameters/missionName"
      responses:
        "200":
          description: Mission health report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MissionHealthResponse"

