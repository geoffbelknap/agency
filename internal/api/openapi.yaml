openapi: 3.1.0
info:
  title: Agency Gateway API
  version: 0.1.0
  description: |
    REST API for the Agency AI agent operating platform. Deploys agents in
    enforced isolation containers with credential scoping, network mediation,
    read-only constraints, and continuous audit.

    All endpoints except /health require API token authentication via the
    X-Agency-Token header. Streaming endpoints accept `Accept: application/x-ndjson`.

    This spec is the canonical Agency API contract. Agency product tiering is
    represented with vendor extensions such as `x-agency-tier` and
    `x-agency-stability`. Consumers should treat `core` as the supported
    default surface, `experimental` as opt-in, and `internal` as non-public.
  license:
    name: Proprietary

servers:
  - url: http://localhost:8200/api/v1
    description: Local gateway daemon

security:
  - apiToken: []

x-agency-spec-tiering:
  default_supported_tier: core
  tiers:
    - core
    - experimental
    - internal

tags:
  - name: Health
    description: Health check and platform initialization
    x-agency-tier: core
    x-agency-stability: supported
  - name: Agents
    description: Agent lifecycle — create, start, stop, halt, resume, restart, delete; budget, context, memory, economics
    x-agency-tier: core
    x-agency-stability: supported
  - name: Missions
    description: Mission lifecycle — create, assign, pause, resume, complete; memory, evaluations, canvas
    x-agency-tier: experimental
    x-agency-stability: experimental
  - name: Admin
    description: Administrative operations — doctor, destroy, trust, audit, egress, capabilities, policy, teams, registry, profiles
    x-agency-tier: core
    x-agency-stability: supported
    x-agency-note: Mixed tag. Some operations are core, while advanced governance and profile surfaces should move to operation-level tiering.
  - name: Hub
    description: Component registry — search, install, configure, activate; presets, deploy, teardown, connectors, egress
    x-agency-tier: experimental
    x-agency-stability: experimental
  - name: Packages
    description: V2 local package registry — installed package listing and inspection
    x-agency-tier: experimental
    x-agency-stability: experimental
  - name: Instances
    description: V2 local instances — governed local realizations of installed packages
    x-agency-tier: experimental
    x-agency-stability: experimental
  - name: AuthZ
    description: V2 grant resolution and authorization decisions
    x-agency-tier: experimental
    x-agency-stability: experimental
  - name: Graph
    description: Knowledge graph queries, export, ontology, curation, communities, quarantine, classification, principals
    x-agency-tier: core
    x-agency-stability: supported
    x-agency-note: Mixed tag. Query, retrieval, and stats are core; governance and ontology surfaces should move to operation-level tiering.
  - name: Infra
    description: Shared infrastructure lifecycle — up, down, rebuild, reload, status, routing, providers, setup
    x-agency-tier: core
    x-agency-stability: supported
    x-agency-note: Mixed tag. Basic infra and provider setup are core; advanced routing and broader setup surfaces may need operation-level tiering.
  - name: Comms
    description: Inter-agent communication channels, messages, unreads
    x-agency-tier: core
    x-agency-stability: supported
  - name: Creds
    description: Encrypted credential store — CRUD, rotate, test, groups; internal credential resolution
    x-agency-tier: core
    x-agency-stability: supported
  - name: Events
    description: Platform event bus — events, webhooks, notifications, subscriptions, intake
    x-agency-tier: experimental
    x-agency-stability: experimental
    x-agency-note: Event-driven architecture is core, but broad event-management and intake surfaces are not yet part of the default supported product path.
  - name: MCP
    description: MCP tool registry — list and call tools
    x-agency-tier: core
    x-agency-stability: supported
  - name: Platform
    description: Platform-level operations
    x-agency-tier: core
    x-agency-stability: supported
  - name: Internal
    description: Internal infrastructure LLM proxy
    x-agency-tier: internal
    x-agency-stability: internal

paths:
  # ── Health ──────────────────────────────────────────────────────────────────
  /health:
    get:
      operationId: health
      summary: Health check
      tags: [Health]
      security: []
      responses:
        "200":
          description: Gateway is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                  build_id:
                    type: string

  /init:
    post:
      operationId: initPlatform
      summary: Bootstrap the Agency platform
      tags: [Health]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                operator:
                  type: string
                force:
                  type: boolean
                anthropic_api_key:
                  type: string
                openai_api_key:
                  type: string
      responses:
        "200":
          description: Platform initialized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  # ── Packages ────────────────────────────────────────────────────────────────
  /packages:
    get:
      operationId: listPackages
      summary: List installed V2 packages
      tags: [Packages]
      parameters:
        - name: kind
          in: query
          required: false
          schema:
            type: string
          description: Optional package kind filter
      responses:
        "200":
          description: Installed package metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackageListResponse"
        "400":
          $ref: "#/components/responses/NotFound"

  /packages/{kind}/{name}:
    get:
      operationId: showPackage
      summary: Show one installed V2 package
      tags: [Packages]
      parameters:
        - name: kind
          in: path
          required: true
          schema:
            type: string
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Installed package metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstalledPackage"
        "404":
          $ref: "#/components/responses/NotFound"

  /instances:
    get:
      operationId: listInstances
      summary: List local V2 instances
      tags: [Instances]
      responses:
        "200":
          description: Local instances
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstanceListResponse"
    post:
      operationId: createInstance
      summary: Create a local V2 instance
      tags: [Instances]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Instance"
      responses:
        "201":
          description: Created instance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Instance"

  /instances/from-package:
    post:
      operationId: createInstanceFromPackage
      summary: Scaffold a local V2 instance from an installed package
      tags: [Instances]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [kind, name]
              properties:
                kind:
                  type: string
                name:
                  type: string
                instance_name:
                  type: string
                node_id:
                  type: string
                config:
                  type: object
                  additionalProperties: true
                node_config:
                  type: object
                  additionalProperties: true
      responses:
        "201":
          description: Created instance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Instance"

  /instances/{id}:
    get:
      operationId: showInstance
      summary: Show a local V2 instance
      tags: [Instances]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Instance detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Instance"
        "404":
          $ref: "#/components/responses/NotFound"

  /instances/{id}/validate:
    post:
      operationId: validateInstance
      summary: Validate a stored V2 instance
      tags: [Instances]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /instances/{id}/claim:
    post:
      operationId: claimInstance
      summary: Claim ownership of a local V2 instance
      tags: [Instances]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                owner:
                  type: string
      responses:
        "200":
          description: Claim recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /instances/{id}/release:
    post:
      operationId: releaseInstance
      summary: Release ownership of a local V2 instance
      tags: [Instances]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Claim released
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /instances/{id}/runtime/manifest:
    get:
      operationId: showRuntimeManifest
      summary: Show the persisted V2 runtime manifest for an instance
      tags: [Instances]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Runtime manifest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeManifest"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: compileRuntimeManifest
      summary: Compile and persist a V2 runtime manifest for an instance
      tags: [Instances]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Runtime manifest compiled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeManifest"

  /instances/{id}/runtime/reconcile:
    post:
      operationId: reconcileRuntimeManifest
      summary: Reconcile a persisted V2 runtime manifest
      tags: [Instances]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Runtime manifest reconciled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeManifest"
        "409":
          description: Runtime manifest is stale
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /instances/{id}/runtime/nodes/{nodeID}:
    get:
      operationId: runtimeNodeStatus
      summary: Show runtime status for a reconciled instance node
      tags: [Instances]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: nodeID
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Runtime node status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeNodeStatus"

  /instances/{id}/runtime/nodes/{nodeID}/start:
    post:
      operationId: startRuntimeNode
      summary: Mark a reconciled authority runtime node active
      tags: [Instances]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: nodeID
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Runtime node status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeNodeStatus"

  /instances/{id}/runtime/nodes/{nodeID}/stop:
    post:
      operationId: stopRuntimeNode
      summary: Mark a reconciled authority runtime node stopped
      tags: [Instances]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: nodeID
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Runtime node status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeNodeStatus"

  /instances/{id}/runtime/nodes/{nodeID}/invoke:
    post:
      operationId: invokeRuntimeNode
      summary: Invoke an active authority runtime node
      tags: [Instances]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: nodeID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Runtime node invoke response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /instances/{id}/runtime/nodes/{nodeID}/actions/{action}:
    post:
      operationId: invokeRuntimeAction
      summary: Invoke a specific action on an active authority runtime node
      tags: [Instances]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: nodeID
          in: path
          required: true
          schema:
            type: string
        - name: action
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Runtime node action response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /authz/resolve:
    post:
      operationId: resolveAuthz
      summary: Resolve a V2 authorization request against explicit grants
      tags: [AuthZ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthzRequest"
      responses:
        "200":
          description: Authorization decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthzDecision"

  # ── Agents ──────────────────────────────────────────────────────────────────
  /agents:
    get:
      operationId: listAgents
      summary: List all agents
      tags: [Agents]
      responses:
        "200":
          description: Array of agent summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentSummary"
    post:
      operationId: createAgent
      summary: Create a new agent
      tags: [Agents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                preset:
                  type: string
                  default: generalist
      responses:
        "201":
          description: Agent created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /agents/{name}:
    get:
      operationId: showAgent
      summary: Show agent detail
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
      responses:
        "200":
          description: Agent detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDetail"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteAgent
      summary: Delete an agent and its containers
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
      responses:
        "200":
          description: Agent deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /agents/{name}/start:
    post:
      operationId: startAgent
      summary: Start an agent (seven-phase sequence)
      description: |
        Runs the seven-phase start sequence: verify, enforcement, constraints,
        workspace, identity, body, session. Supports NDJSON streaming when
        Accept: application/x-ndjson is set.
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
      responses:
        "200":
          description: Agent started (JSON or NDJSON stream)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartResult"
            application/x-ndjson:
              schema:
                description: Stream of phase progress events ending with a complete event. Events include gateway-measured elapsed_ms; phase events also include phase_elapsed_ms.

  /agents/{name}/restart:
    post:
      operationId: restartAgent
      summary: Restart an agent with key rotation
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
      responses:
        "200":
          description: Agent restarted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartResult"
        "404":
          $ref: "#/components/responses/NotFound"

  /agents/{name}/stop:
    post:
      operationId: stopAgent
      summary: Stop (halt) an agent
      description: |
        Three-tier halt: supervised (graceful), immediate (SIGTERM), emergency
        (SIGKILL + silent). Emergency halt requires a reason (ASK Tenet 2).
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  enum: [supervised, immediate, emergency]
                  default: supervised
                reason:
                  type: string
                initiator:
                  type: string
      responses:
        "200":
          description: Halt record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HaltRecord"

  /agents/{name}/halt:
    post:
      operationId: haltAgent
      summary: Halt an agent (alias for stop)
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  enum: [supervised, immediate, emergency]
                  default: supervised
                reason:
                  type: string
                initiator:
                  type: string
      responses:
        "200":
          description: Halt record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HaltRecord"

  /agents/{name}/resume:
    post:
      operationId: resumeAgent
      summary: Resume a halted agent
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                initiator:
                  type: string
      responses:
        "200":
          description: Agent resumed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /agents/{name}/grant:
    post:
      operationId: grantAgent
      summary: Grant a capability to an agent
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [capability]
              properties:
                capability:
                  type: string
      responses:
        "200":
          description: Capability granted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  agent:
                    type: string
                  capability:
                    type: string

  /agents/{name}/revoke:
    post:
      operationId: revokeAgent
      summary: Revoke a capability from an agent
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [capability]
              properties:
                capability:
                  type: string
      responses:
        "200":
          description: Capability revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  agent:
                    type: string
                  capability:
                    type: string

  /agents/{name}/signal:
    post:
      operationId: relaySignal
      summary: Relay a body-originated signal via WebSocket
      description: |
        Mediated path: body -> enforcer -> gateway -> WebSocket hub.
        ASK tenet 2: every action leaves a trace.
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [signal_type]
              properties:
                signal_type:
                  type: string
                data:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          description: Signal relayed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /agents/{name}/channels:
    get:
      operationId: agentChannels
      summary: List channels an agent is a member of
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
      responses:
        "200":
          description: Array of channels
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /agents/{name}/dm:
    post:
      operationId: ensureAgentDM
      summary: Ensure the dedicated direct-message channel for an agent
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
      responses:
        "200":
          description: Dedicated DM channel is ready for use
          content:
            application/json:
              schema:
                type: object
                required: [status, channel]
                properties:
                  status:
                    type: string
                    example: ready
                  channel:
                    type: string
                    example: dm-henry

  /agents/{name}/results:
    get:
      operationId: listResults
      summary: List task results in agent workspace
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
      responses:
        "200":
          description: Array of result identifiers with parsed metadata summaries when available
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    task_id:
                      type: string
                    has_metadata:
                      type: boolean
                    metadata:
                      type: object
                      additionalProperties: true
                    pact:
                      type: object
                      nullable: true
                      additionalProperties: true
                    metadata_error:
                      type: string

  /agents/{name}/results/{taskId}:
    get:
      operationId: getResult
      summary: Get a task result document
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
        - name: taskId
          in: path
          required: true
          schema:
            type: string
        - name: download
          in: query
          schema:
            type: string
            enum: ["true", "false"]
      responses:
        "200":
          description: Markdown result document
          content:
            text/markdown:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/NotFound"

  /agents/{name}/results/{taskId}/metadata:
    get:
      operationId: getResultMetadata
      summary: Get structured task result metadata
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: YAML frontmatter metadata parsed from a task result document
          content:
            application/json:
              schema:
                type: object
                required: [task_id, metadata, has_metadata]
                properties:
                  task_id:
                    type: string
                  has_metadata:
                    type: boolean
                  metadata:
                    type: object
                    additionalProperties: true
                  pact:
                    type: object
                    nullable: true
                    additionalProperties: true
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Invalid result metadata

  /agents/{name}/pact/runs/{taskId}:
    get:
      operationId: getPactRun
      summary: Get a read-only PACT run projection for a task
      description: |
        Assembles a PACT run view from existing durable sources such as result
        artifact frontmatter and append-only audit events. This endpoint is a
        projection only; it does not create a new authoritative PACT storage
        layer.
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: PACT run projection assembled from result and audit evidence
          content:
            application/json:
              schema:
                type: object
                required: [task_id, agent, audit_events, sources]
                properties:
                  task_id:
                    type: string
                  agent:
                    type: string
                  activation:
                    type: object
                    nullable: true
                    additionalProperties: true
                  contract:
                    type: object
                    nullable: true
                    additionalProperties: true
                  evidence:
                    type: object
                    nullable: true
                    additionalProperties: true
                  verdict:
                    type: object
                    nullable: true
                    additionalProperties: true
                  outcome:
                    type: string
                  artifact:
                    type: object
                    nullable: true
                    additionalProperties: true
                  audit_events:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  sources:
                    type: array
                    items:
                      type: string
        "400":
          description: Invalid task ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /agents/{name}/config:
    get:
      operationId: getAgentConfig
      summary: Get full agent config bundle
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
      responses:
        "200":
          description: Agent configuration bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentConfigBundle"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateAgentConfig
      summary: Partially update agent config
      description: |
        Accepts partial updates — only fields present in the request body are
        updated. ASK tenet 6: constraint changes trigger enforcer reload so the
        agent sees old or new, never a mix.
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                agent_yaml:
                  type: object
                  additionalProperties: true
                identity:
                  type: string
                  nullable: true
                constraints:
                  type: object
                  additionalProperties: true
                workspace:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          description: Updated config bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentConfigBundle"
        "404":
          $ref: "#/components/responses/NotFound"

  /agents/{name}/runtime/manifest:
    get:
      operationId: showAgentRuntimeManifest
      summary: Show the persisted runtime manifest for an agent
      description: |
        Returns the persisted runtime contract for the agent, including the
        compiled spec, projected runtime status, backend inspection details, and
        backend capabilities. This is the operator-facing source of truth for
        runtime state; callers should not reconstruct runtime state from raw
        Docker conventions.
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
      responses:
        "200":
          description: Agent runtime manifest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRuntimeManifest"
        "404":
          $ref: "#/components/responses/NotFound"

  /agents/{name}/runtime/status:
    get:
      operationId: showAgentRuntimeStatus
      summary: Show the projected runtime status for an agent
      description: |
        Returns the current runtime phase, health, backend identity, and
        transport connectivity state for the agent.
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
      responses:
        "200":
          description: Agent runtime status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRuntimeStatus"
        "404":
          $ref: "#/components/responses/NotFound"

  /agents/{name}/runtime/validate:
    post:
      operationId: validateAgentRuntime
      summary: Validate the runtime contract for an agent
      description: |
        Runs fail-closed runtime validation against the active backend and
        transport configuration for the agent.
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
      responses:
        "200":
          description: Runtime validated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeValidationResult"
        "400":
          description: Runtime validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeValidationResult"
        "404":
          $ref: "#/components/responses/NotFound"

  /agents/{name}/logs:
    get:
      operationId: agentLogs
      summary: Get agent audit logs
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
        - name: since
          in: query
          schema:
            type: string
            format: date-time
        - name: until
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Array of audit log entries (max 500)
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
                  properties:
                    task_id:
                      type: string
                    has_result:
                      type: boolean
                      description: True when this audit event's task_id has a saved result artifact.
                    result:
                      type: object
                      nullable: true
                      properties:
                        task_id:
                          type: string
                        url:
                          type: string

  # ── Budget ──────────────────────────────────────────────────────────────────
  /agents/{name}/budget:
    get:
      operationId: getBudget
      summary: Get agent budget usage (computed from audit logs)
      description: |
        Returns daily and monthly usage with limits and remaining budget.
        Usage is computed from enforcer audit logs (same source as routing metrics).
        No separate budget recording needed — costs are derived from LLM call logs.
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
      responses:
        "200":
          description: Budget state
          content:
            application/json:
              schema:
                type: object
                properties:
                  agent_name:
                    type: string
                  daily_used:
                    type: number
                    format: double
                  daily_limit:
                    type: number
                    format: double
                  daily_remaining:
                    type: number
                    format: double
                  monthly_used:
                    type: number
                    format: double
                  monthly_limit:
                    type: number
                    format: double
                  monthly_remaining:
                    type: number
                    format: double
                  per_task_limit:
                    type: number
                    format: double
                  today_llm_calls:
                    type: integer
                  today_input_tokens:
                    type: integer
                    format: int64
                  today_output_tokens:
                    type: integer
                    format: int64

  /agents/{name}/budget/remaining:
    get:
      operationId: getBudgetRemaining
      summary: Get remaining budget (lightweight)
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
      responses:
        "200":
          description: Remaining budget
          content:
            application/json:
              schema:
                type: object
                properties:
                  daily_used:
                    type: number
                    format: double
                  daily_limit:
                    type: number
                    format: double
                  daily_remaining:
                    type: number
                    format: double
                  monthly_used:
                    type: number
                    format: double
                  monthly_limit:
                    type: number
                    format: double
                  monthly_remaining:
                    type: number
                    format: double

  # ── Context ─────────────────────────────────────────────────────────────────
  /agents/{name}/context/constraints:
    get:
      operationId: getConstraints
      summary: Get current acknowledged constraints for an agent
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
      responses:
        "200":
          description: Current constraints
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /agents/{name}/context/policy:
    get:
      operationId: getContextPolicy
      summary: Get agent name and current constraints
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
      responses:
        "200":
          description: Agent policy view
          content:
            application/json:
              schema:
                type: object
                properties:
                  agent:
                    type: string
                  constraints:
                    type: object
                    additionalProperties: true

  /agents/{name}/context/exceptions:
    get:
      operationId: getExceptions
      summary: Get exceptions (currently returns empty list)
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
      responses:
        "200":
          description: Empty exception list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /agents/{name}/context/changes:
    get:
      operationId: getChanges
      summary: Get full constraint change history
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
      responses:
        "200":
          description: Array of constraint changes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConstraintChange"

  /agents/{name}/context/push:
    post:
      operationId: pushConstraints
      summary: Push new constraints to a running agent
      description: |
        Validates the request, calls Manager.Push, triggers async delivery to
        the agent's enforcer via WebSocket. Two-stage timeout handles alerting
        and auto-halt for unacknowledged changes.
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [constraints, reason]
              properties:
                constraints:
                  type: object
                  additionalProperties: true
                severity_override:
                  type: string
                reason:
                  type: string
                initiator:
                  type: string
                  default: operator
      responses:
        "202":
          description: Constraint push accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  change_id:
                    type: string
                  version:
                    type: integer
                  severity:
                    type: string
                  status:
                    type: string
                  ack_timeout_seconds:
                    type: integer

  /agents/{name}/context/status:
    get:
      operationId: getContextStatus
      summary: Get latest constraint change status
      tags: [Agents]
      parameters:
        - $ref: "#/components/parameters/agentName"
      responses:
        "200":
          description: Latest change status or no_changes
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ConstraintChange"
                  - type: object
                    properties:
                      status:
                        type: string
                        example: no_changes

  # ── Presets ─────────────────────────────────────────────────────────────────
  /hub/presets:
    get:
      operationId: listPresets
      summary: List all presets (user presets shadow built-in)
      tags: [Hub]
      responses:
        "200":
          description: Merged list of presets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PresetInfo"
    post:
      operationId: createPreset
      summary: Create a new user preset
      tags: [Hub]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PresetFull"
      responses:
        "201":
          description: Preset created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "409":
          description: Preset already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /hub/presets/{name}:
    get:
      operationId: getPreset
      summary: Get full preset content
      tags: [Hub]
      parameters:
        - $ref: "#/components/parameters/presetName"
      responses:
        "200":
          description: Full preset document with source
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PresetFull"
                  - type: object
                    properties:
                      source:
                        type: string
                        enum: [built-in, user]
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updatePreset
      summary: Update a user preset (built-in are read-only)
      tags: [Hub]
      parameters:
        - $ref: "#/components/parameters/presetName"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PresetFull"
      responses:
        "200":
          description: Preset updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "403":
          description: Built-in presets are read-only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deletePreset
      summary: Delete a user preset
      tags: [Hub]
      parameters:
        - $ref: "#/components/parameters/presetName"
      responses:
        "200":
          description: Preset deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "403":
          description: Built-in presets are read-only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Deploy ──────────────────────────────────────────────────────────────────
  /hub/deploy:
    post:
      operationId: deployPack
      summary: Deploy an agent pack
      tags: [Hub]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pack_path:
                  type: string
                pack:
                  type: object
                  description: Inline pack definition
                dry_run:
                  type: boolean
                credentials:
                  type: object
                  additionalProperties:
                    type: string
      responses:
        "200":
          description: Deploy result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /hub/teardown/{pack}:
    post:
      operationId: teardownPack
      summary: Tear down a deployed pack
      tags: [Hub]
      parameters:
        - name: pack
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                delete:
                  type: boolean
      responses:
        "200":
          description: Pack torn down
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  # ── Policy ──────────────────────────────────────────────────────────────────
  /admin/policy/{agent}:
    get:
      operationId: showPolicy
      summary: Show effective policy for an agent
      tags: [Admin]
      x-agency-tier: core
      x-agency-stability: supported
      parameters:
        - name: agent
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Effective policy
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /admin/policy/{agent}/validate:
    post:
      operationId: validatePolicy
      summary: Validate policy for an agent including hard floor enforcement
      tags: [Admin]
      x-agency-tier: core
      x-agency-stability: supported
      parameters:
        - name: agent
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Policy is valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyValidation"
        "400":
          description: Policy has violations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyValidation"

  # ── Hub ─────────────────────────────────────────────────────────────────────
  /hub/update:
    post:
      operationId: hubUpdate
      summary: Refresh hub sources (does not upgrade)
      description: |
        Git-pulls all configured hub sources into hub-cache.
        Returns source diffs and available upgrades. Does NOT sync
        managed files or upgrade components — use /hub/upgrade for that.
      tags: [Hub]
      responses:
        "200":
          description: Update report with source diffs and available upgrades
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateReport"

  /hub/outdated:
    get:
      operationId: hubOutdated
      summary: Show available upgrades from current cache
      description: |
        Compares installed component versions and managed file hashes
        against the hub cache. No network access, no writes.
      tags: [Hub]
      responses:
        "200":
          description: List of available upgrades
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AvailableUpgrade"

  /hub/upgrade:
    post:
      operationId: hubUpgrade
      summary: Apply available upgrades
      description: |
        Syncs managed files and upgrades installed components.
        With no body or empty components list, upgrades everything.
        With specific component names, upgrades only those (no managed file sync).
      tags: [Hub]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                components:
                  type: array
                  items:
                    type: string
                  description: Specific components to upgrade (omit to upgrade all)
      responses:
        "200":
          description: Upgrade report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpgradeReport"

  /hub/search:
    get:
      operationId: hubSearch
      summary: Search hub components
      tags: [Hub]
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: kind
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HubComponent"

  /hub/install:
    post:
      operationId: hubInstall
      summary: Install a hub component
      tags: [Hub]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [component, kind]
              properties:
                component:
                  type: string
                kind:
                  type: string
                as:
                  type: string
                name:
                  type: string
                  description: Legacy field (use component instead)
                source:
                  type: string
      responses:
        "200":
          description: Component installed
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  id:
                    type: string
                  status:
                    type: string

  /hub/installed:
    get:
      operationId: hubInstalled
      summary: List installed hub components
      tags: [Hub]
      responses:
        "200":
          description: Installed components
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    kind:
                      type: string
                    source:
                      type: string
                    installed_at:
                      type: string

  /hub/instances:
    get:
      operationId: hubInstances
      summary: List hub instances (optionally filtered by kind)
      tags: [Hub]
      parameters:
        - name: kind
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Instance list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HubInstance"

  /hub/deployments:
    get:
      operationId: hubDeploymentList
      summary: List hub deployments
      tags: [Hub]
      responses:
        "200":
          description: Deployment list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HubDeployment"
    post:
      operationId: hubDeploymentCreate
      summary: Create a hub deployment
      tags: [Hub]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pack]
              properties:
                pack:
                  type: string
                name:
                  type: string
                config:
                  type: object
                  additionalProperties: true
                credrefs:
                  type: object
                  additionalProperties:
                    type: string
      responses:
        "200":
          description: Deployment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HubDeployment"

  /hub/deployments/import:
    post:
      operationId: hubDeploymentImport
      summary: Import a hub deployment bundle
      tags: [Hub]
      parameters:
        - name: name
          in: query
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/gzip:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: Deployment imported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HubDeployment"

  /hub/deployments/schema/{pack}:
    get:
      operationId: hubDeploymentSchema
      summary: Get deployment schema for a pack
      tags: [Hub]
      parameters:
        - name: pack
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Pack deployment schema
          content:
            application/json:
              schema:
                type: object
                properties:
                  pack:
                    type: object
                    additionalProperties: true
                  schema:
                    type: object
                    additionalProperties: true

  /hub/deployments/{nameOrID}:
    get:
      operationId: hubDeploymentShow
      summary: Show a hub deployment
      tags: [Hub]
      parameters:
        - $ref: "#/components/parameters/nameOrID"
      responses:
        "200":
          description: Deployment detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  deployment:
                    $ref: "#/components/schemas/HubDeployment"
                  schema:
                    type: object
                    additionalProperties: true
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: hubDeploymentDestroy
      summary: Destroy a hub deployment
      tags: [Hub]
      parameters:
        - $ref: "#/components/parameters/nameOrID"
        - name: keep_instances
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Deployment destroyed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /hub/deployments/{nameOrID}/config:
    put:
      operationId: hubDeploymentConfigure
      summary: Update deployment configuration
      tags: [Hub]
      parameters:
        - $ref: "#/components/parameters/nameOrID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                config:
                  type: object
                  additionalProperties: true
                credrefs:
                  type: object
                  additionalProperties:
                    type: string
      responses:
        "200":
          description: Deployment configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /hub/deployments/{nameOrID}/validate:
    post:
      operationId: hubDeploymentValidate
      summary: Validate deployment configuration
      tags: [Hub]
      parameters:
        - $ref: "#/components/parameters/nameOrID"
      responses:
        "200":
          description: Deployment valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /hub/deployments/{nameOrID}/apply:
    post:
      operationId: hubDeploymentApply
      summary: Apply deployment configuration to child hub instances
      tags: [Hub]
      parameters:
        - $ref: "#/components/parameters/nameOrID"
      responses:
        "200":
          description: Deployment applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /hub/deployments/{nameOrID}/export:
    get:
      operationId: hubDeploymentExport
      summary: Export a hub deployment bundle
      tags: [Hub]
      parameters:
        - $ref: "#/components/parameters/nameOrID"
      responses:
        "200":
          description: Deployment bundle
          content:
            application/gzip:
              schema:
                type: string
                format: binary

  /hub/deployments/{nameOrID}/claim:
    post:
      operationId: hubDeploymentClaim
      summary: Claim ownership of a hub deployment
      tags: [Hub]
      parameters:
        - $ref: "#/components/parameters/nameOrID"
        - name: force
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Deployment claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /hub/deployments/{nameOrID}/release:
    post:
      operationId: hubDeploymentRelease
      summary: Release ownership of a hub deployment
      tags: [Hub]
      parameters:
        - $ref: "#/components/parameters/nameOrID"
      responses:
        "200":
          description: Deployment released
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /hub/{nameOrID}:
    get:
      operationId: hubShow
      summary: Show hub instance detail
      tags: [Hub]
      parameters:
        - $ref: "#/components/parameters/nameOrID"
      responses:
        "200":
          description: Instance detail with config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HubInstanceDetail"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: hubRemove
      summary: Remove a hub instance
      tags: [Hub]
      parameters:
        - $ref: "#/components/parameters/nameOrID"
      responses:
        "200":
          description: Instance removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /hub/{nameOrID}/activate:
    post:
      operationId: hubActivate
      summary: Activate a hub instance (may require config)
      tags: [Hub]
      parameters:
        - $ref: "#/components/parameters/nameOrID"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                config:
                  type: object
                  additionalProperties:
                    type: string
      responses:
        "200":
          description: Activated or config_required
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [active, config_required]
                  name:
                    type: string
                  id:
