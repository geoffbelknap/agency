              type: object
              required: [event_key]
              properties:
                event_key:
                  type: string
                agent_name:
                  type: string
      responses:
        "200":
          description: Claim result
          content:
            application/json:
              schema:
                type: object
                properties:
                  claimed:
                    type: boolean
                  holder:
                    type: string
    delete:
      operationId: releaseMissionClaim
      summary: Release a previously claimed event
      tags: [Missions]
      parameters:
        - $ref: "#/components/parameters/missionName"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                event_key:
                  type: string
      responses:
        "200":
          description: Claim released
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

