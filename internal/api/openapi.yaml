  # ── Admin ───────────────────────────────────────────────────────────────────
  /admin/doctor:
    get:
      operationId: adminDoctor
      summary: Run security guarantee checks on all running agents
      description: |
        Runs 7 checks per agent: credentials isolated, network mediation,
        constraints read-only, enforcer audit active, audit not writable,
        halt functional, operator override available.
      tags: [Admin]
      responses:
        "200":
          description: Doctor report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorReport"

  /admin/destroy:
    post:
      operationId: adminDestroy
      summary: Destroy all agents and infrastructure
      tags: [Admin]
      responses:
        "200":
          description: Everything destroyed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /admin/trust:
    post:
      operationId: adminTrust
      summary: Manage agent trust levels
      description: |
        Actions: list (no agent required), show, elevate, demote, record.
        Trust levels: 1=minimal, 2=low, 3=standard, 4=high, 5=elevated.
        ASK tenet 15: elevation always requires human approval.
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [list, show, elevate, demote, record]
                agent:
                  type: string
                level:
                  type: string
                signal_type:
                  type: string
                description:
                  type: string
                args:
                  type: object
                  additionalProperties:
                    type: string
      responses:
        "200":
          description: Trust operation result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /admin/audit:
    get:
      operationId: adminAudit
      summary: Query audit logs
      description: |
        With action=stats returns aggregate statistics. Otherwise returns log
        entries filtered by agent, since, and until.
      tags: [Admin]
      parameters:
        - name: action
          in: query
          schema:
            type: string
            enum: [stats]
        - name: agent
          in: query
          schema:
            type: string
        - name: since
          in: query
          schema:
            type: string
        - name: until
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Audit log entries or stats
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /admin/egress:
    get:
      operationId: adminEgress
      summary: Get egress configuration for an agent
      tags: [Admin]
      parameters:
        - name: agent
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Egress configuration
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /admin/knowledge:
    post:
      operationId: adminKnowledge
      summary: Administrative knowledge graph operations
      description: |
        Actions: stats, health, flags, log, query, neighbors, path, changes,
        export, graph, reset, restore, unflag, ontology_candidates,
        ontology_promote, ontology_reject.
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                args:
                  type: object
                  additionalProperties:
                    type: string
      responses:
        "200":
          description: Operation result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /admin/department:
    post:
      operationId: adminDepartment
      summary: Manage departments
      description: "Actions: list, show."
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [list, show]
                args:
                  type: object
                  additionalProperties:
                    type: string
      responses:
        "200":
          description: Department operation result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /admin/model:
    post:
      operationId: adminModel
      summary: Manage model configuration
      description: "Actions: show, set."
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [show, set]
                args:
                  type: object
                  additionalProperties:
                    type: string
      responses:
        "200":
          description: Model configuration
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /egress/domains:
    get:
