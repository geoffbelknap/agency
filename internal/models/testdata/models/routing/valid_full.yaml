providers:
  primary:
    api_base: https://primary.example
    auth_env: PRIMARY_PROVIDER_API_KEY
    caching: true
  fallback:
    api_base: https://fallback.example
    auth_env: FALLBACK_PROVIDER_API_KEY
models:
  standard-model:
    provider: primary
    provider_model: provider-standard
    cost_per_mtok_in: 3.0
    cost_per_mtok_out: 15.0
    cost_per_mtok_cached: 0.3
  fast-model:
    provider: primary
    provider_model: provider-fast
    cost_per_mtok_in: 0.8
    cost_per_mtok_out: 4.0
tiers:
  standard:
    - model: standard-model
      preference: 0
  fast:
    - model: fast-model
      preference: 0
    - model: standard-model
      preference: 10
settings:
  default_tier: standard
  default_timeout: 300
