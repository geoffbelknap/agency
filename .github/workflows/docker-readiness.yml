name: Docker Readiness

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 13 * * 1'

permissions:
  contents: read

jobs:
  docker-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect Docker-relevant changes
        id: changes
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          if ./scripts/ci-backend-smoke-needed.sh docker "origin/${{ github.base_ref }}" HEAD; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip Docker smoke for unrelated PR changes
        if: ${{ github.event_name == 'pull_request' && steps.changes.outputs.run != 'true' }}
        run: echo "No Docker-relevant changes detected; skipping Docker smoke."

      - uses: actions/setup-go@v6
        if: ${{ github.event_name != 'pull_request' || steps.changes.outputs.run == 'true' }}
        with:
          go-version: '1.26'
          cache: true

      - name: Verify Docker availability
        if: ${{ github.event_name != 'pull_request' || steps.changes.outputs.run == 'true' }}
        run: docker info >/dev/null

      - name: Build gateway binary
        if: ${{ github.event_name != 'pull_request' || steps.changes.outputs.run == 'true' }}
        run: go build -o ./agency ./cmd/gateway

      - name: Run Docker readiness smoke
        if: ${{ github.event_name != 'pull_request' || steps.changes.outputs.run == 'true' }}
        run: make docker-readiness
        env:
          AGENCY_DOCKER_SOCKET: unix:///var/run/docker.sock
