name: Release Preflight

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/release-preflight.yaml"
      - ".github/workflows/release.yaml"
      - ".goreleaser.yaml"
      - "scripts/release/**"

permissions:
  contents: read

jobs:
  homebrew-release-preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: go.sum

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          install-only: true

      - name: Run Homebrew release preflight
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/release/homebrew-release-preflight.sh
