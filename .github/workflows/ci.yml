name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Go tests
        run: go test ./...

  python-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install pytest pytest-asyncio pytest-aiohttp pytest-timeout pydantic pyyaml httpx aiohttp docker jinja2 croniter

      - name: Python tests
        run: >-
          pytest images/tests/ -x -q --timeout=30
          --ignore=images/tests/test_realtime_comms_e2e.py
          --ignore=images/tests/test_comms_e2e.py
        timeout-minutes: 5

  web-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        run: npm run build

      - name: Test
        working-directory: web
        run: npm test
