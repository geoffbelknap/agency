name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Go vet
        run: go vet ./...

      - name: Go tests
        run: go test -race -count=1 ./...

  python-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: 'images/tests/requirements-ci.txt'

      - name: Install dependencies
        run: pip install -r images/tests/requirements-ci.txt

      - name: Python tests
        run: >-
          pytest images/tests/ -x -q --timeout=30
          --ignore=images/tests/test_realtime_comms_e2e.py
          --ignore=images/tests/test_comms_e2e.py
        timeout-minutes: 5

  web-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Install Playwright browser
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Build
        working-directory: web
        run: npm run build

      - name: Unit tests
        working-directory: web
        run: npm test

      - name: Mocked browser tests
        working-directory: web
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-web-test-artifacts
          path: |
            web/playwright-report/
            web/test-results/
          if-no-files-found: ignore
