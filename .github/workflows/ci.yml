name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Go vet
        run: go vet ./...

      - name: Go tests
        run: go test -race -count=1 ./...

  python-unit-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: 'images/tests/requirements-ci.txt'

      - name: Install dependencies
        run: pip install -r images/tests/requirements-ci.txt

      - name: Python unit tests
        run: >-
          pytest images/tests/ -x -vv --timeout=30 --durations=20
          --ignore=images/tests/test_graph_intelligence.py
          --ignore=images/tests/test_knowledge_curator.py
          --ignore=images/tests/test_knowledge_federation.py
          --ignore=images/tests/test_knowledge_org_context.py
          --ignore=images/tests/test_knowledge_review_gate.py
          --ignore=images/tests/test_knowledge_server.py
          --ignore=images/tests/test_knowledge_synthesizer.py
          --ignore=images/tests/test_realtime_comms_e2e.py
          --ignore=images/tests/test_comms_e2e.py
        timeout-minutes: 8

  python-knowledge-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: 'images/tests/requirements-ci.txt'

      - name: Install dependencies
        run: pip install -r images/tests/requirements-ci.txt

      - name: Python knowledge and synthesis tests
        run: >-
          pytest
          images/tests/test_graph_intelligence.py
          images/tests/test_knowledge_curator.py
          images/tests/test_knowledge_federation.py
          images/tests/test_knowledge_org_context.py
          images/tests/test_knowledge_review_gate.py
          images/tests/test_knowledge_server.py
          images/tests/test_knowledge_synthesizer.py
          -x -vv --timeout=30 --durations=20
        timeout-minutes: 8

  web-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}

      - name: Install Playwright browser
        working-directory: web
        timeout-minutes: 5
        run: npx playwright install chromium

      - name: Build
        working-directory: web
        run: npm run build

      - name: Unit tests
        working-directory: web
        run: npm test

      - name: Mocked browser tests
        working-directory: web
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-web-test-artifacts
          path: |
            web/playwright-report/
            web/test-results/
          if-no-files-found: ignore
