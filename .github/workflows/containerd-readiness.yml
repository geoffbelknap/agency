name: Containerd Readiness

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 15 * * 2'

permissions:
  contents: read

jobs:
  containerd-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect container backend relevant changes
        id: changes
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          if ./scripts/ci-backend-smoke-needed.sh containerd "origin/${{ github.base_ref }}" HEAD; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip containerd smoke for unrelated PR changes
        if: ${{ github.event_name == 'pull_request' && steps.changes.outputs.run != 'true' }}
        run: echo "No container-backend relevant changes detected; skipping containerd smoke."

      - uses: actions/setup-go@v6
        if: ${{ github.event_name != 'pull_request' || steps.changes.outputs.run == 'true' }}
        with:
          go-version: '1.26'
          cache: true

      - name: Install containerd prerequisites
        if: ${{ github.event_name != 'pull_request' || steps.changes.outputs.run == 'true' }}
        run: |
          sudo timeout 180s apt-get update \
            -o Acquire::Retries=3 \
            -o Acquire::http::Timeout=15 \
            -o Acquire::https::Timeout=15
          sudo timeout 180s apt-get install -y --no-install-recommends \
            uidmap \
            rootlesskit \
            containernetworking-plugins

      - name: Install nerdctl and buildkit
        if: ${{ github.event_name != 'pull_request' || steps.changes.outputs.run == 'true' }}
        run: |
          sudo wget -qO- https://github.com/containerd/nerdctl/releases/download/v2.1.6/nerdctl-2.1.6-linux-amd64.tar.gz | sudo tar -C /usr/local/bin -xz
          sudo wget -qO- https://github.com/moby/buildkit/releases/download/v0.25.1/buildkit-v0.25.1.linux-amd64.tar.gz | sudo tar -C /usr/local -xz
          echo "/usr/local/bin" >> "$GITHUB_PATH"

      - name: Start rootless containerd and buildkit
        if: ${{ github.event_name != 'pull_request' || steps.changes.outputs.run == 'true' }}
        run: |
          export XDG_RUNTIME_DIR="/run/user/$(id -u)"
          mkdir -p "$XDG_RUNTIME_DIR"
          echo "XDG_RUNTIME_DIR=$XDG_RUNTIME_DIR" >> "$GITHUB_ENV"
          echo "CONTAINERD_HOST=unix://$XDG_RUNTIME_DIR/containerd/containerd.sock" >> "$GITHUB_ENV"
          mkdir -p ~/.config/systemd/user
          sudo mkdir -p /opt/cni
          sudo ln -sfn /usr/lib/cni /opt/cni/bin
          export PATH="/usr/local/bin:$PATH"
          containerd-rootless-setuptool.sh install
          systemctl --user enable --now containerd
          containerd-rootless-setuptool.sh install-buildkit-containerd
          systemctl --user enable --now buildkit
          nerdctl info

      - name: Build gateway binary
        if: ${{ github.event_name != 'pull_request' || steps.changes.outputs.run == 'true' }}
        run: go build -o ./agency ./cmd/gateway

      - name: Run containerd readiness smoke
        if: ${{ github.event_name != 'pull_request' || steps.changes.outputs.run == 'true' }}
        run: make containerd-readiness
