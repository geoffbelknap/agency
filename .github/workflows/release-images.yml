name: Release Container Images

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/geoffbelknap
  CACHE_PREFIX: ghcr.io/geoffbelknap/agency-buildcache

permissions:
  contents: read
  packages: write

jobs:
  build-python-base:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push python-base
        id: build
        uses: docker/build-push-action@v7
        with:
          context: images/python-base
          file: images/python-base/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/agency-python-base:v${{ steps.version.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/agency-python-base:latest
          cache-from: type=registry,ref=${{ env.CACHE_PREFIX }}:python-base
          cache-to: type=registry,ref=${{ env.CACHE_PREFIX }}:python-base,mode=max

  build-workspace-base:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push workspace-base
        id: build
        uses: docker/build-push-action@v7
        with:
          context: images/workspace-base
          file: images/workspace-base/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/agency-workspace-base:v${{ steps.version.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/agency-workspace-base:latest
          cache-from: type=registry,ref=${{ env.CACHE_PREFIX }}:workspace-base
          cache-to: type=registry,ref=${{ env.CACHE_PREFIX }}:workspace-base,mode=max

  build-and-push:
    needs: [build-python-base, build-workspace-base]
    name: build-${{ matrix.image.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          # Repo-context images: need repo root for shared models/logging
          - name: comms
            context: images/comms
            dockerfile: images/comms/Dockerfile
          - name: knowledge
            context: images/knowledge
            dockerfile: images/knowledge/Dockerfile
          - name: body
            context: images/body
            dockerfile: images/body/Dockerfile
          - name: egress
            context: images/egress
            dockerfile: images/egress/Dockerfile
          # Self-contained images: build context is their own directory
          - name: enforcer
            context: images/enforcer
            dockerfile: images/enforcer/Dockerfile
          - name: workspace
            context: images/workspace
            dockerfile: images/workspace/Dockerfile
          - name: gateway-proxy
            context: images/gateway-proxy
            dockerfile: images/gateway-proxy/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.image.context }}
          build-contexts: |
            shared=images
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            BUILD_ID=${{ github.sha }}
            PYTHON_BASE_IMAGE=${{ env.IMAGE_PREFIX }}/agency-python-base@${{ needs.build-python-base.outputs.digest }}
            WORKSPACE_BASE_IMAGE=${{ env.IMAGE_PREFIX }}/agency-workspace-base@${{ needs.build-workspace-base.outputs.digest }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/agency-${{ matrix.image.name }}:v${{ steps.version.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/agency-${{ matrix.image.name }}:latest
          cache-from: type=registry,ref=${{ env.CACHE_PREFIX }}:${{ matrix.image.name }}
          cache-to: type=registry,ref=${{ env.CACHE_PREFIX }}:${{ matrix.image.name }},mode=max

  build-and-push-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: web
          file: web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            BUILD_ID=${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/agency-web:v${{ steps.version.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/agency-web:latest
          cache-from: type=registry,ref=${{ env.CACHE_PREFIX }}:web
          cache-to: type=registry,ref=${{ env.CACHE_PREFIX }}:web,mode=max
