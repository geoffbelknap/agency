name: Release Container Images

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/geoffbelknap

permissions:
  contents: read
  packages: write

jobs:
  build-python-base:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push python-base
        uses: docker/build-push-action@v7
        with:
          context: images/python-base
          file: images/python-base/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/agency-python-base:v${{ steps.version.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/agency-python-base:latest
          cache-from: type=gha,scope=python-base
          cache-to: type=gha,scope=python-base,mode=max

  build-and-push:
    needs: build-python-base
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          # Repo-context images: need repo root for shared models/logging
          - name: comms
            context: .
            dockerfile: images/comms/Dockerfile
          - name: knowledge
            context: .
            dockerfile: images/knowledge/Dockerfile
          - name: intake
            context: .
            dockerfile: images/intake/Dockerfile
          - name: body
            context: .
            dockerfile: images/body/Dockerfile
          - name: egress
            context: .
            dockerfile: images/egress/Dockerfile
          # Self-contained images: build context is their own directory
          - name: enforcer
            context: images/enforcer
            dockerfile: images/enforcer/Dockerfile
          - name: workspace
            context: images/workspace
            dockerfile: images/workspace/Dockerfile
          - name: web-fetch
            context: images/web-fetch
            dockerfile: images/web-fetch/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            BUILD_ID=${{ github.sha }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/agency-${{ matrix.image.name }}:v${{ steps.version.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/agency-${{ matrix.image.name }}:latest
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,scope=${{ matrix.image.name }},mode=max

  build-and-push-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: web
          file: web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            BUILD_ID=${{ github.sha }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/agency-web:v${{ steps.version.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/agency-web:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

  retag-upstream-embeddings:
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Pull, retag, and push Ollama for embeddings
        env:
          TARGET_VERSIONED: ${{ env.IMAGE_PREFIX }}/agency-embeddings:v${{ steps.version.outputs.version }}
          TARGET_LATEST: ${{ env.IMAGE_PREFIX }}/agency-embeddings:latest
        run: |
          OLLAMA_VERSION="0.9.3"
          SOURCE="ollama/ollama:${OLLAMA_VERSION}"

          docker buildx imagetools create \
            --tag "${TARGET_VERSIONED}" \
            --tag "${TARGET_LATEST}" \
            "${SOURCE}"
