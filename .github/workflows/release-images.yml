name: Release Container Images

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/geoffbelknap

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          # Repo-context images: need repo root for agency_core/models/
          - name: comms
            context: .
            dockerfile: images/comms/Dockerfile
          - name: knowledge
            context: .
            dockerfile: images/knowledge/Dockerfile
          - name: intake
            context: .
            dockerfile: images/intake/Dockerfile
          # Self-contained images: build context is their own directory
          - name: enforcer
            context: images/enforcer
            dockerfile: images/enforcer/Dockerfile
          - name: egress
            context: images/egress
            dockerfile: images/egress/Dockerfile
          - name: body
            context: images/body
            dockerfile: images/body/Dockerfile
          - name: workspace
            context: images/workspace
            dockerfile: images/workspace/Dockerfile
          - name: web-fetch
            context: images/web-fetch
            dockerfile: images/web-fetch/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            BUILD_ID=${{ github.sha }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/agency-${{ matrix.image.name }}:v${{ steps.version.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/agency-${{ matrix.image.name }}:latest
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,scope=${{ matrix.image.name }},mode=max

  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout agency-web
        uses: actions/checkout@v6
        with:
          repository: geoffbelknap/agency-web

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            BUILD_ID=${{ github.sha }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/agency-web:v${{ steps.version.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/agency-web:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
