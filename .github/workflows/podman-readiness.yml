name: Podman Readiness

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      full_e2e:
        description: 'Run the full Podman disposable E2E release gate after smoke'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '0 14 * * 1'

permissions:
  contents: read

jobs:
  podman-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect Podman-relevant changes
        id: changes
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          if git diff --name-only "origin/${{ github.base_ref }}"...HEAD | grep -E '^(cmd/gateway/|internal/|web/|scripts/|images/|Makefile|go\.mod|go\.sum|\.github/workflows/podman-readiness\.yml|docs/runbooks/)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip Podman smoke for unrelated PR changes
        if: ${{ github.event_name == 'pull_request' && steps.changes.outputs.run != 'true' }}
        run: echo "No Podman-relevant changes detected; skipping Podman smoke."

      - uses: actions/setup-go@v6
        if: ${{ github.event_name != 'pull_request' || steps.changes.outputs.run == 'true' }}
        with:
          go-version: '1.26'
          cache: true

      - uses: actions/setup-node@v5
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.full_e2e }}
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'

      - name: Install Podman
        if: ${{ github.event_name != 'pull_request' || steps.changes.outputs.run == 'true' }}
        run: |
          if command -v podman >/dev/null 2>&1; then
            podman --version
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends podman

      - name: Start Podman service
        if: ${{ github.event_name != 'pull_request' || steps.changes.outputs.run == 'true' }}
        run: |
          nohup podman system service --time=0 unix:///tmp/podman.sock >/tmp/podman-service.log 2>&1 &
          for _ in $(seq 1 20); do
            if curl --silent --fail --unix-socket /tmp/podman.sock http://d/_ping >/dev/null; then
              exit 0
            fi
            sleep 0.5
          done
          echo "Podman service did not become ready" >&2
          cat /tmp/podman-service.log >&2 || true
          exit 1

      - name: Build gateway binary
        if: ${{ github.event_name != 'pull_request' || steps.changes.outputs.run == 'true' }}
        run: go build -o ./agency ./cmd/gateway

      - name: Run Podman readiness smoke
        if: ${{ github.event_name != 'pull_request' || steps.changes.outputs.run == 'true' }}
        run: make podman-readiness
        env:
          AGENCY_PODMAN_SOCKET: unix:///tmp/podman.sock

      - name: Install web dependencies
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.full_e2e }}
        working-directory: web
        run: npm ci

      - name: Cache Playwright browsers
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.full_e2e }}
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}

      - name: Install Playwright browser
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.full_e2e }}
        working-directory: web
        timeout-minutes: 5
        run: npx playwright install chromium

      - name: Run Podman readiness full E2E
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.full_e2e }}
        run: make podman-readiness-full
        env:
          AGENCY_PODMAN_SOCKET: unix:///tmp/podman.sock
