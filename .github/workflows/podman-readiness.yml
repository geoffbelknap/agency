name: Podman Readiness

on:
  workflow_dispatch:
  schedule:
    - cron: '0 14 * * 1'

permissions:
  contents: read

jobs:
  podman-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Start Podman service
        run: |
          podman info --format json
          nohup podman system service --time=0 unix:///tmp/podman.sock >/tmp/podman-service.log 2>&1 &
          sleep 2
          curl --unix-socket /tmp/podman.sock http://d/_ping

      - name: Build gateway binary
        run: go build -o ./agency ./cmd/gateway

      - name: Run Podman readiness smoke
        run: make podman-readiness
        env:
          AGENCY_PODMAN_SOCKET: unix:///tmp/podman.sock
