name: Podman Readiness

on:
  workflow_dispatch:
    inputs:
      full_e2e:
        description: 'Run the full Podman disposable E2E release gate after smoke'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '0 14 * * 1'

permissions:
  contents: read

jobs:
  podman-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Start Podman service
        run: |
          podman info --format json
          nohup podman system service --time=0 unix:///tmp/podman.sock >/tmp/podman-service.log 2>&1 &
          sleep 2
          curl --unix-socket /tmp/podman.sock http://d/_ping

      - name: Build gateway binary
        run: go build -o ./agency ./cmd/gateway

      - name: Run Podman readiness smoke
        run: make podman-readiness
        env:
          AGENCY_PODMAN_SOCKET: unix:///tmp/podman.sock

      - name: Run Podman readiness full E2E
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.full_e2e }}
        run: make podman-readiness-full
        env:
          AGENCY_PODMAN_SOCKET: unix:///tmp/podman.sock
