name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate Homebrew tap token
        id: app-token
        uses: actions/create-github-app-token@v3.1.1
        with:
          client-id: ${{ secrets.HOMEBREW_APP_CLIENT_ID }}
          private-key: ${{ secrets.HOMEBREW_APP_PRIVATE_KEY }}
          repositories: homebrew-tap

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: go.sum

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Verify pinned kernel artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/release/verify-kernel-artifacts.sh

      - name: Verify pinned Apple VF helper artifacts
        id: apple-vf-helpers
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/release/verify-apple-vf-helper-assets.sh

      - name: Build Homebrew Python wheelhouses
        id: homebrew-python-wheelhouses
        run: ./scripts/release/build-homebrew-python-wheelhouses.sh

      - name: Audit Homebrew Python dependencies
        run: ./scripts/release/audit-homebrew-python-deps.sh

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean --config ${{ contains(github.ref_name, '-rc') && '.goreleaser.rc.yaml' || '.goreleaser.yaml' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ steps.app-token.outputs.token }}
          AGENCY_APPLE_VF_HELPERS_DARWIN_ARM64_SHA256: ${{ steps.apple-vf-helpers.outputs.sha256 }}
          AGENCY_PYTHON_WHEELHOUSE_DARWIN_ARM64_SHA256: ${{ steps.homebrew-python-wheelhouses.outputs.AGENCY_PYTHON_WHEELHOUSE_DARWIN_ARM64_SHA256 }}
          AGENCY_PYTHON_WHEELHOUSE_DARWIN_AMD64_SHA256: ${{ steps.homebrew-python-wheelhouses.outputs.AGENCY_PYTHON_WHEELHOUSE_DARWIN_AMD64_SHA256 }}
          AGENCY_PYTHON_WHEELHOUSE_LINUX_AMD64_SHA256: ${{ steps.homebrew-python-wheelhouses.outputs.AGENCY_PYTHON_WHEELHOUSE_LINUX_AMD64_SHA256 }}
          AGENCY_PYTHON_WHEELHOUSE_LINUX_ARM64_SHA256: ${{ steps.homebrew-python-wheelhouses.outputs.AGENCY_PYTHON_WHEELHOUSE_LINUX_ARM64_SHA256 }}
