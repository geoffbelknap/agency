name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate Homebrew tap token
        id: app-token
        uses: actions/create-github-app-token@v3.1.1
        with:
          client-id: ${{ secrets.HOMEBREW_APP_CLIENT_ID }}
          private-key: ${{ secrets.HOMEBREW_APP_PRIVATE_KEY }}
          repositories: homebrew-tap

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: go.sum

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean --config ${{ contains(github.ref_name, '-rc') && '.goreleaser.rc.yaml' || '.goreleaser.yaml' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Publish Firecracker kernel artifact
        if: runner.os == 'Linux'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential cpio file flex gawk git gnupg libncurses-dev rsync unzip wget xz-utils
          ./scripts/readiness/firecracker-kernel-artifacts.sh
          mkdir -p dist/firecracker-kernel
          cp "$HOME/.agency/runtime/firecracker/artifacts/vmlinux" dist/firecracker-kernel/agency-firecracker-vmlinux_x86_64
          sha256sum dist/firecracker-kernel/agency-firecracker-vmlinux_x86_64 > dist/firecracker-kernel/agency-firecracker-vmlinux_x86_64.sha256
          gh release upload "$GITHUB_REF_NAME" \
            dist/firecracker-kernel/agency-firecracker-vmlinux_x86_64 \
            dist/firecracker-kernel/agency-firecracker-vmlinux_x86_64.sha256 \
            --clobber
