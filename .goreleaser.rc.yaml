version: 2

project_name: agency

before:
  hooks:
    - npm --prefix web --cache .cache/npm ci
    - npm --prefix web run build
    - make firecracker-helpers

builds:
  - id: agency
    main: ./cmd/gateway/
    binary: agency
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
      - -X main.buildID={{.ShortCommit}}

archives:
  - id: default
    formats: [tar.gz]
    name_template: "agency_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE*
      - install.sh
      - services/*.py
      - services/**/*.py
      - services/**/*.yaml
      - services/**/requirements.txt
      - bin/enforcer
      - bin/agency-vsock-http-bridge
      - scripts/install/*
      - scripts/readiness/*
      - images/firecracker/buildroot/**/*
      - web/dist/index.html
      - web/dist/favicon.svg
      - web/dist/assets/*

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - ids:
      - default
    repository:
      owner: geoffbelknap
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    name: agency-rc
    homepage: "https://github.com/geoffbelknap/agency"
    description: "Agency — An operating system for AI agents (release candidate)"
    conflicts:
      - agency
    dependencies:
      - name: python@3.14
      - name: e2fsprogs
    custom_block: |
      on_macos do
        on_arm do
          resource "agency-apple-vf-helpers" do
            url "https://github.com/geoffbelknap/agency/releases/download/agency-apple-vf-helpers-0.1.0-r1/agency-apple-vf-helpers-0.1.0-darwin-arm64.tar.gz"
            sha256 "{{ .Env.AGENCY_APPLE_VF_HELPERS_DARWIN_ARM64_SHA256 }}"
          end
        end
      end
    extra_install: |
      pkgshare.install "bin"
      if OS.mac? && Hardware::CPU.arm?
        resource("agency-apple-vf-helpers").stage do
          (pkgshare/"bin").install Dir["bin/*"]
        end
      end
      pkgshare.install "images"
      pkgshare.install "services"
      pkgshare.install "scripts"
      pkgshare.install "web"
    post_install: |
      ENV["AGENCY_PYTHON_VENV"] = "#{libexec}/venv"
      system "#{pkgshare}/scripts/install/host-dependencies.sh", "--skip-system-packages"
    caveats: |
      This formula installs the Agency release-candidate channel.
      It conflicts with the stable agency formula because both install `agency`.

      Start here:

        agency quickstart

      Runtime dependencies:
        - python@3.14: host-managed infra services and egress Python environment
        - e2fsprogs: mke2fs for microVM root filesystem creation

      macOS Apple silicon Apple VF setup:
        agency quickstart uses the packaged signed Apple VF helper bundle and
        provisions the pinned Agency guest kernel when it is missing.

      Linux and WSL Firecracker setup:
        agency quickstart provisions the pinned Firecracker binary and Agency
        guest kernel artifact when they are missing. To provision them explicitly:

          agency runtime provision firecracker

      Quick start guide: https://github.com/geoffbelknap/agency#readme
    test: |
      system "#{bin}/agency", "--version"

release:
  github:
    owner: geoffbelknap
    name: agency
  prerelease: auto
  name_template: "Agency v{{.Version}}"
